<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NB Inventario</title>
<style>
:root {
  --green: #2d6a4f; --green-light: #40916c; --green-bg: #d8f3dc;
  --red: #d00000; --red-bg: #ffd6d6;
  --orange: #e85d04; --orange-bg: #fff3e0;
  --blue: #0077b6; --blue-bg: #caf0f8;
  --gray: #6c757d; --gray-bg: #f8f9fa; --gray-border: #dee2e6;
  --dark: #212529; --white: #fff;
  --radius: 12px; --shadow: 0 2px 8px rgba(0,0,0,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f0f2f5; color:var(--dark); -webkit-tap-highlight-color:transparent; }

/* Header */
.header { background:var(--green); color:var(--white); padding:16px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.header h1 { font-size:20px; font-weight:700; }
.header .subtitle { font-size:12px; opacity:.8; margin-top:2px; }

/* Back button */
.back-btn { position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--white); font-size:24px; cursor:pointer; padding:4px 8px; display:none; }

/* Route selection */
.routes { padding:16px; display:flex; flex-direction:column; gap:12px; max-width:500px; margin:0 auto; }
.route-card { background:var(--white); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); cursor:pointer; border:2px solid transparent; transition:all .2s; display:flex; align-items:center; gap:16px; }
.route-card:active { transform:scale(.98); }
.route-card .icon { font-size:36px; width:56px; height:56px; display:flex; align-items:center; justify-content:center; border-radius:12px; flex-shrink:0; }
.route-card .info h3 { font-size:16px; font-weight:600; }
.route-card .info p { font-size:13px; color:var(--gray); margin-top:2px; }
.route-card .count { margin-left:auto; font-size:24px; font-weight:700; color:var(--green); }
.route-card.cat-insumos .icon { background:#e8f5e9; }
.route-card.cat-envases .icon { background:#e3f2fd; }
.route-card.cat-mercado .icon { background:#fff3e0; }

/* Section list */
.section-list { padding:12px; max-width:500px; margin:0 auto; }
.progress-bar-wrap { background:var(--gray-border); border-radius:20px; height:8px; margin:8px 16px 16px; overflow:hidden; }
.progress-bar-fill { background:var(--green); height:100%; border-radius:20px; transition:width .3s; }
.progress-text { text-align:center; font-size:13px; color:var(--gray); margin-bottom:8px; }

/* Section card */
.section-card { background:var(--white); border-radius:var(--radius); margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden; }
.section-header { padding:14px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
.section-header .loc-icon { font-size:20px; }
.section-header .loc-name { font-size:15px; font-weight:600; flex:1; }
.section-header .loc-count { font-size:12px; color:var(--gray); background:var(--gray-bg); padding:2px 8px; border-radius:10px; }
.section-header .loc-check { font-size:18px; color:var(--green); display:none; }
.section-header .chevron { font-size:14px; color:var(--gray); transition:transform .2s; }
.section-card.done .section-header { background:var(--green-bg); }
.section-card.done .loc-check { display:block; }
.section-card.open .chevron { transform:rotate(180deg); }

/* Items */
.items-wrap { display:none; border-top:1px solid var(--gray-border); }
.section-card.open .items-wrap { display:block; }
.item-row { padding:10px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #f0f0f0; }
.item-row:last-child { border-bottom:none; }
.item-info { flex:1; min-width:0; }
.item-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-meta { font-size:11px; color:var(--gray); margin-top:1px; }
.item-meta .unit-badge { background:var(--blue-bg); color:var(--blue); padding:1px 5px; border-radius:4px; font-size:10px; }

/* Stepper */
.stepper { display:flex; align-items:center; gap:0; flex-shrink:0; }
.stepper button { width:36px; height:36px; border:none; background:var(--gray-bg); color:var(--dark); font-size:20px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.stepper button:first-child { border-radius:8px 0 0 8px; }
.stepper button:last-child { border-radius:0 8px 8px 0; }
.stepper button:active { background:var(--gray-border); }
.stepper input { width:48px; height:36px; border:1px solid var(--gray-border); border-left:none; border-right:none; text-align:center; font-size:15px; font-weight:600; -moz-appearance:textfield; }
.stepper input::-webkit-outer-spin-button,
.stepper input::-webkit-inner-spin-button { -webkit-appearance:none; }

/* Section footer */
.section-footer { padding:10px 16px; background:var(--gray-bg); display:flex; gap:8px; }
.section-footer button { flex:1; padding:10px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
.btn-ok { background:var(--green); color:var(--white); }
.btn-ok:active { background:var(--green-light); }
.btn-reset { background:var(--white); color:var(--gray); border:1px solid var(--gray-border) !important; }

/* Summary bar */
.summary-bar { position:fixed; bottom:0; left:0; right:0; background:var(--white); padding:12px 16px; box-shadow:0 -2px 10px rgba(0,0,0,.1); display:none; z-index:90; }
.summary-bar .inner { max-width:500px; margin:0 auto; display:flex; gap:10px; align-items:center; }
.summary-bar .stats { flex:1; font-size:13px; }
.summary-bar .stats strong { color:var(--green); }
.btn-summary { background:var(--orange); color:var(--white); border:none; padding:12px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; }
.btn-summary:active { opacity:.9; }

/* Summary modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border-radius:16px 16px 0 0; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; padding:20px 16px 32px; }
.modal h2 { font-size:18px; margin-bottom:4px; }
.modal .modal-sub { font-size:13px; color:var(--gray); margin-bottom:16px; }
.modal .store-group { margin-bottom:16px; }
.modal .store-name { font-size:14px; font-weight:700; color:var(--green); padding:6px 0; border-bottom:2px solid var(--green-bg); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.modal .buy-item { font-size:13px; padding:4px 0; display:flex; justify-content:space-between; }
.modal .buy-item .qty { font-weight:600; color:var(--orange); }
.modal .close-btn { display:block; width:100%; padding:14px; background:var(--green); color:var(--white); border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:16px; }
.modal .copy-btn { display:block; width:100%; padding:14px; background:var(--white); color:var(--green); border:2px solid var(--green); border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }

/* Views */
.view { display:none; }
.view.active { display:block; }

/* Toast */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--dark); color:var(--white); padding:10px 20px; border-radius:20px; font-size:13px; z-index:300; display:none; white-space:nowrap; }
.toast.show { display:block; animation:fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }

/* Last updated */
.last-updated { text-align:center; padding:8px; font-size:11px; color:var(--gray); }

/* All done celebration */
.all-done { text-align:center; padding:40px 20px; }
.all-done .big-check { font-size:64px; margin-bottom:12px; }
.all-done h3 { font-size:18px; color:var(--green); }
.all-done p { font-size:13px; color:var(--gray); margin-top:4px; }

/* Pedir / Recibir route cards */
.route-card.cat-pedir .icon { background:#fff3e0; }
.route-card.cat-recibir .icon { background:#e8eaf6; }

/* Order cards */
.order-card { background:var(--white); border-radius:var(--radius); margin-bottom:10px; box-shadow:var(--shadow); padding:14px 16px; }
.order-card .supplier { font-size:15px; font-weight:600; }
.order-card .order-meta { font-size:12px; color:var(--gray); margin-top:2px; }
.order-card .order-items { font-size:13px; color:#555; margin-top:6px; line-height:1.5; }
.order-card .order-actions { display:flex; gap:8px; margin-top:10px; }
.order-card .order-actions button { flex:1; padding:10px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
.btn-receive { background:#3f51b5; color:var(--white); }
.btn-receive:active { opacity:.9; }
.btn-whatsapp { background:#25d366; color:var(--white); }
.btn-whatsapp:active { opacity:.9; }
.btn-ir { background:var(--orange); color:var(--white); }
.btn-ir:active { opacity:.9; }
.btn-pedido { background:#0077b6; color:var(--white); }
.btn-pedido:active { opacity:.9; }

/* Status badges */
.status-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.status-ordered { background:#e3f2fd; color:#1565c0; }
.status-received { background:#e8f5e9; color:#2e7d32; }
.status-pending { background:#fff3e0; color:#e65100; }

/* Modal actions fix */
.modal-actions { display:flex; gap:8px; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
  <h1>NB Inventario</h1>
  <div class="subtitle" id="headerSub">Selecciona una categoría</div>
</div>

<!-- View 1: Route Selection -->
<div class="view active" id="viewRoutes">
  <div class="routes" id="routeCards"></div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<!-- View 2: Section List -->
<div class="view" id="viewSections">
  <div class="progress-text" id="progressText"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="section-list" id="sectionList"></div>
</div>

<!-- Summary Bar -->
<div class="summary-bar" id="summaryBar">
  <div class="inner">
    <div class="stats" id="summaryStats"></div>
    <button class="btn-summary" onclick="showSummary()">📋 Lista de Compras</button>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="summaryModal">
  <div class="modal">
    <h2>🛒 Lista de Compras</h2>
    <div class="modal-sub" id="summaryDate"></div>
    <div id="summaryContent"></div>
    <button class="copy-btn" onclick="copySummary()">📋 Copiar lista</button>
    <button class="close-btn" onclick="closeSummary()">Cerrar</button>
  </div>
</div>

<!-- View 3: Pedir (Ordering) -->
<div class="view" id="viewPedir">
  <div class="section-list" id="pedirList"></div>
</div>

<!-- View 4: Recibir (Receiving) -->
<div class="view" id="viewRecibir">
  <div class="section-list" id="recibirList">
    <div style="text-align:center;padding:40px 20px;color:var(--gray)">
      <div style="font-size:48px;margin-bottom:12px">📦</div>
      <p>No hay pedidos pendientes por recibir</p>
    </div>
  </div>
</div>

<!-- Receive Modal -->
<div class="modal-overlay" id="receiveModal" onclick="if(event.target===this)closeReceiveModal()">
  <div class="modal">
    <h2>📦 Recibir Pedido</h2>
    <div id="receiveModalInfo"></div>
    <label>Recibido por</label>
    <select id="receiverSelect" style="width:100%;padding:10px;border:1px solid var(--gray-border);border-radius:8px;font-size:14px;margin-bottom:8px">
      <option value="">— Seleccionar —</option>
    </select>
    <label>📷 Foto de factura (opcional)</label>
    <input type="file" id="receivePhoto" accept="image/*" capture="environment" style="font-size:13px;padding:6px 0;margin-bottom:8px">
    <label>Notas (opcional)</label>
    <input type="text" id="receiveNotes" placeholder="Ej: Faltó 1 caja de..." style="width:100%;padding:10px;border:1px solid var(--gray-border);border-radius:8px;font-size:14px;margin-bottom:12px">
    <div class="modal-actions" style="display:flex;gap:8px">
      <button class="btn-reset" onclick="closeReceiveModal()" style="flex:1;padding:12px;border-radius:8px;font-size:14px;cursor:pointer">Cancelar</button>
      <button class="btn-ok" onclick="confirmReceive()" style="flex:1;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;border:none">✅ Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ PRODUCT DATA ============
</script>
<script id="productData">
</script>
<script>
// Will be populated by buildProductData() or inline

// ============ STATE ============
const STORAGE_KEY = 'nb_inventario_counts';
const STORAGE_TS = 'nb_inventario_ts';
const STORAGE_DONE = 'nb_inventario_done_sections';

let currentCategory = null;
let counts = {};      // { productIndex: count }
let doneSections = {}; // { "category|location": true }

// ============ LOCATION ICONS ============
const LOC_ICONS = {
  'Cocina': '🍳',
  'Almacén': '📦',
  'Cuarto Frio Materia Prima': '🧊',
  'Cuarto Frio Ventas': '🧊',
  'Congelador (Himalaya)': '❄️',
  'Congelador (ataúd)': '❄️',
  'Producción': '🏭',
  'Tienda': '🏪',
  'Comedor': '🍽️',
  'Oficina': '🗂️',
  'Proveedores': '🚚',
  'Granja': '🌾',
  'Casa 1': '🏠',
  'Sin ubicación': '📍'
};
const CAT_ICONS = {
  'Insumos / Clubs': '🛒',
  'Envases y Limpieza': '📦',
  'Mercado Abastos + Carnes': '🥩'
};
const CAT_DESCRIPTIONS = {
  'Insumos / Clubs': 'Abarrotes, especias, clubs',
  'Envases y Limpieza': 'Empaques, bolsas, limpieza',
  'Mercado Abastos + Carnes': 'Verduras, carnes, congelados'
};

// ============ INIT ============
function init() {
  loadState();
  renderRoutes();
  updateLastUpdated();
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) counts = JSON.parse(saved);
    const savedDone = localStorage.getItem(STORAGE_DONE);
    if (savedDone) doneSections = JSON.parse(savedDone);
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
  localStorage.setItem(STORAGE_DONE, JSON.stringify(doneSections));
  localStorage.setItem(STORAGE_TS, new Date().toISOString());
}

// ============ ROUTES VIEW ============
function renderRoutes() {
  const cats = {};
  PRODUCTS.forEach((p, i) => {
    if (!cats[p.c]) cats[p.c] = { count: 0, locations: new Set() };
    cats[p.c].count++;
    cats[p.c].locations.add(p.l);
  });

  const order = ['Insumos / Clubs', 'Envases y Limpieza', 'Mercado Abastos + Carnes'];
  const classes = ['cat-insumos', 'cat-envases', 'cat-mercado'];

  let html = '';
  order.forEach((cat, idx) => {
    if (!cats[cat]) return;
    const info = cats[cat];
    const doneCount = countDoneSections(cat);
    const totalSections = info.locations.size;
    html += `
      <div class="route-card ${classes[idx]}" onclick="selectCategory('${cat.replace(/'/g,"\\'")}')">
        <div class="icon">${CAT_ICONS[cat] || '📋'}</div>
        <div class="info">
          <h3>${cat}</h3>
          <p>${CAT_DESCRIPTIONS[cat] || ''} · ${info.locations.size} secciones</p>
          ${doneCount > 0 ? `<p style="color:var(--green);font-weight:600">${doneCount}/${totalSections} listas ✓</p>` : ''}
        </div>
        <div class="count">${info.count}</div>
      </div>`;
  });
  // Add Pedir and Recibir cards
  const pendingOrders = orders.filter(o => o.status === 'ordered').length;
  html += `
    <div style="border-top:2px solid var(--gray-border);margin:8px 0;padding-top:4px"></div>
    <div class="route-card cat-pedir" onclick="showPedir()">
      <div class="icon">🛒</div>
      <div class="info">
        <h3>Pedir</h3>
        <p>Ordenar productos faltantes</p>
      </div>
      <div class="count" style="font-size:16px">📋</div>
    </div>
    <div class="route-card cat-recibir" onclick="showRecibir()">
      <div class="icon">📦</div>
      <div class="info">
        <h3>Recibir</h3>
        <p>Confirmar entregas de proveedores</p>
        ${pendingOrders > 0 ? `<p style="color:#1565c0;font-weight:600">${pendingOrders} pedido${pendingOrders>1?'s':''} por recibir</p>` : ''}
      </div>
      <div class="count" style="font-size:16px">${pendingOrders > 0 ? pendingOrders : '—'}</div>
    </div>`;

  document.getElementById('routeCards').innerHTML = html;
}

function countDoneSections(cat) {
  return Object.keys(doneSections).filter(k => k.startsWith(cat + '|')).length;
}

// ============ SECTIONS VIEW ============
function selectCategory(cat) {
  currentCategory = cat;
  showView('viewSections');
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerSub').textContent = cat;
  document.getElementById('summaryBar').style.display = 'block';
  renderSections();
}

function renderSections() {
  // Group products by location
  const locMap = {};
  PRODUCTS.forEach((p, i) => {
    if (p.c !== currentCategory) return;
    if (!locMap[p.l]) locMap[p.l] = [];
    locMap[p.l].push({ ...p, idx: i });
  });

  // Sort locations: done sections at bottom
  const locKeys = Object.keys(locMap).sort((a, b) => {
    const aDone = doneSections[currentCategory + '|' + a] ? 1 : 0;
    const bDone = doneSections[currentCategory + '|' + b] ? 1 : 0;
    if (aDone !== bDone) return aDone - bDone;
    return b.length - a.length; // bigger sections first
  });

  const totalSections = locKeys.length;
  const doneCount = locKeys.filter(l => doneSections[currentCategory + '|' + l]).length;

  document.getElementById('progressText').textContent = `${doneCount} de ${totalSections} secciones completadas`;
  document.getElementById('progressFill').style.width = (totalSections > 0 ? (doneCount/totalSections*100) : 0) + '%';

  let html = '';

  if (doneCount === totalSections && totalSections > 0) {
    html += `<div class="all-done">
      <div class="big-check">✅</div>
      <h3>¡${currentCategory} completo!</h3>
      <p>Todas las secciones han sido contadas</p>
    </div>`;
  }

  locKeys.forEach(loc => {
    const items = locMap[loc];
    const sectionKey = currentCategory + '|' + loc;
    const isDone = doneSections[sectionKey];
    const icon = LOC_ICONS[loc] || LOC_ICONS[loc.split(',')[0].trim()] || '📍';

    html += `
      <div class="section-card ${isDone ? 'done' : ''}" id="sec-${encodeKey(sectionKey)}">
        <div class="section-header" onclick="toggleSection('${encodeKey(sectionKey)}')">
          <span class="loc-icon">${icon}</span>
          <span class="loc-name">${loc}</span>
          <span class="loc-check">✓</span>
          <span class="loc-count">${items.length}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="items-wrap">`;

    items.forEach(item => {
      const count = counts[item.idx] !== undefined ? counts[item.idx] : item.inv;
      html += `
          <div class="item-row">
            <div class="item-info">
              <div class="item-name">${item.n}</div>
              <div class="item-meta">
                ${item.s ? '<span>'+item.s+'</span>' : ''}
                ${item.u ? ' <span class="unit-badge">'+item.u+'</span>' : ''}
                ${item.max > 0 ? ' <span>Máx: '+item.max+'</span>' : ''}
              </div>
            </div>
            <div class="stepper">
              <button onclick="adj(${item.idx},-1)">−</button>
              <input type="number" id="cnt-${item.idx}" value="${count}"
                     onchange="setCount(${item.idx},this.value)"
                     inputmode="decimal" step="0.5" min="0">
              <button onclick="adj(${item.idx},1)">+</button>
            </div>
          </div>`;
    });

    html += `
          <div class="section-footer">
            <button class="btn-reset" onclick="resetSection('${encodeKey(sectionKey)}')">↺ Reset</button>
            <button class="btn-ok" onclick="markDone('${encodeKey(sectionKey)}')">
              ${isDone ? '✓ Completada' : '✓ Sección lista'}
            </button>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('sectionList').innerHTML = html;
  updateSummaryStats();
}

function encodeKey(k) { return btoa(unescape(encodeURIComponent(k))).replace(/=/g,''); }
function decodeKey(k) {
  // Add back padding
  while (k.length % 4) k += '=';
  return decodeURIComponent(escape(atob(k)));
}

function toggleSection(encodedKey) {
  const el = document.getElementById('sec-' + encodedKey);
  if (el) el.classList.toggle('open');
}

// ============ COUNTING ============
function adj(idx, delta) {
  const input = document.getElementById('cnt-' + idx);
  let val = parseFloat(input.value) || 0;
  val = Math.max(0, val + delta);
  // Round to nearest 0.5
  val = Math.round(val * 2) / 2;
  input.value = val;
  counts[idx] = val;
  saveState();
}

function setCount(idx, val) {
  const num = parseFloat(val) || 0;
  counts[idx] = Math.max(0, num);
  document.getElementById('cnt-' + idx).value = counts[idx];
  saveState();
}

function markDone(encodedKey) {
  const key = decodeKey(encodedKey);
  doneSections[key] = true;
  saveState();
  renderSections();
  toast('✓ Sección completada');
}

function resetSection(encodedKey) {
  const key = decodeKey(encodedKey);
  const [cat, loc] = [key.split('|')[0], key.split('|').slice(1).join('|')];

  // Reset counts for items in this section
  PRODUCTS.forEach((p, i) => {
    if (p.c === cat && p.l === loc) {
      delete counts[i];
      const input = document.getElementById('cnt-' + i);
      if (input) input.value = p.inv;
    }
  });

  delete doneSections[key];
  saveState();
  renderSections();
  toast('↺ Sección reiniciada');
}

// ============ SUMMARY ============
function updateSummaryStats() {
  // Count items where count < max (needs buying)
  let needBuy = 0;
  let totalItems = 0;
  PRODUCTS.forEach((p, i) => {
    if (p.c !== currentCategory) return;
    totalItems++;
    const current = counts[i] !== undefined ? counts[i] : p.inv;
    if (p.max > 0 && current < p.max) needBuy++;
  });

  const statsEl = document.getElementById('summaryStats');
  if (needBuy > 0) {
    statsEl.innerHTML = `<strong>${needBuy}</strong> productos por comprar`;
  } else {
    statsEl.innerHTML = `<strong>${totalItems}</strong> productos contados`;
  }
}

function showSummary() {
  // Build purchase list grouped by store
  const storeMap = {};
  PRODUCTS.forEach((p, i) => {
    if (currentCategory && p.c !== currentCategory) return;
    const current = counts[i] !== undefined ? counts[i] : p.inv;
    const need = p.max > 0 ? Math.max(0, p.max - current) : 0;
    // Also show items with 0 inventory that might need restocking
    if (need > 0 || (current === 0 && p.max === 0)) {
      const store = p.s || 'Sin tienda';
      if (!storeMap[store]) storeMap[store] = [];
      if (need > 0) {
        storeMap[store].push({ name: p.n, qty: need, unit: p.u, forma: p.f });
      }
    }
  });

  const now = new Date();
  document.getElementById('summaryDate').textContent =
    now.toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  let html = '';
  const storeKeys = Object.keys(storeMap).filter(s => storeMap[s].length > 0).sort();

  if (storeKeys.length === 0) {
    html = '<p style="text-align:center;color:var(--gray);padding:20px">No hay productos por comprar con máximos definidos.<br><br>💡 Define máximos en tu lista para generar pedidos automáticos.</p>';
  } else {
    storeKeys.forEach(store => {
      const items = storeMap[store];
      html += `<div class="store-group">
        <div class="store-name">🏪 ${store} <span style="font-weight:400;font-size:12px;color:var(--gray)">(${items.length})</span></div>`;
      items.forEach(item => {
        html += `<div class="buy-item">
          <span>${item.name}</span>
          <span class="qty">${item.qty}${item.unit ? ' '+item.unit : ''}</span>
        </div>`;
      });
      html += '</div>';
    });
  }

  document.getElementById('summaryContent').innerHTML = html;
  document.getElementById('summaryModal').classList.add('open');
}

function closeSummary() {
  document.getElementById('summaryModal').classList.remove('open');
}

function copySummary() {
  let text = `🛒 Lista de Compras NB\n📅 ${new Date().toLocaleDateString('es-MX')}\n`;
  if (currentCategory) text += `📦 ${currentCategory}\n`;
  text += '\n';

  const storeMap = {};
  PRODUCTS.forEach((p, i) => {
    if (currentCategory && p.c !== currentCategory) return;
    const current = counts[i] !== undefined ? counts[i] : p.inv;
    const need = p.max > 0 ? Math.max(0, p.max - current) : 0;
    if (need > 0) {
      const store = p.s || 'Sin tienda';
      if (!storeMap[store]) storeMap[store] = [];
      storeMap[store].push({ name: p.n, qty: need, unit: p.u });
    }
  });

  Object.keys(storeMap).sort().forEach(store => {
    text += `\n🏪 ${store}\n`;
    storeMap[store].forEach(item => {
      text += `  • ${item.name}: ${item.qty}${item.unit ? ' '+item.unit : ''}\n`;
    });
  });

  navigator.clipboard.writeText(text).then(() => toast('📋 Lista copiada')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('📋 Lista copiada');
  });
}

// ============ NAVIGATION ============
function goBack() {
  currentCategory = null;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('viewRoutes').classList.add('active');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerSub').textContent = 'Selecciona una categoría';
  document.getElementById('summaryBar').style.display = 'none';
  renderRoutes(); // Refresh done counts + order counts
}

// ============ UTILS ============
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function updateLastUpdated() {
  const ts = localStorage.getItem(STORAGE_TS);
  if (ts) {
    const d = new Date(ts);
    document.getElementById('lastUpdated').textContent =
      'Último conteo: ' + d.toLocaleDateString('es-MX') + ' ' + d.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  }
}

// ============ CLEAR ALL ============
function clearAll() {
  if (confirm('¿Borrar todos los conteos y empezar de nuevo?')) {
    counts = {};
    doneSections = {};
    saveState();
    if (currentCategory) renderSections();
    else renderRoutes();
    toast('🗑️ Conteos borrados');
  }
}

// ============ ORDERS / RECEIVING STATE ============
const ORDERS_KEY = 'nb_inventario_orders';
const RECEIVERS_KEY = 'nb_inventario_receivers';

let orders = []; // { id, supplier, items:[{name,qty,unit}], mode, status:'ordered'|'received', ordered_at, received_at, receiver, notes, foto }
let receivers = ['Luis', 'Diana', 'Carlos', 'Ana']; // Default authorized receivers, editable

function loadOrders() {
  try {
    const saved = localStorage.getItem(ORDERS_KEY);
    if (saved) orders = JSON.parse(saved);
    const savedRec = localStorage.getItem(RECEIVERS_KEY);
    if (savedRec) receivers = JSON.parse(savedRec);
  } catch(e) {}
}
function saveOrders() {
  localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
  localStorage.setItem(RECEIVERS_KEY, JSON.stringify(receivers));
}

// ============ PEDIR (ORDERING) VIEW ============
function showPedir() {
  showView('viewPedir');
  document.getElementById('headerSub').textContent = 'Ordenar productos';
  document.getElementById('backBtn').style.display = 'block';
  renderPedir();
}

function renderPedir() {
  // Group products that need ordering (count < inv or below threshold)
  const needsOrder = [];
  PRODUCTS.forEach((p, i) => {
    const current = counts[i] || 0;
    const needed = (p.max > 0 && current < p.max) ? p.max - current : (current < p.inv ? p.inv - current : 0);
    if (needed > 0) {
      needsOrder.push({ ...p, idx: i, current, needed: Math.round(needed * 10) / 10 });
    }
  });

  // Also check shopping list items (items counted as 0 when inv > 0)
  PRODUCTS.forEach((p, i) => {
    if (needsOrder.find(x => x.idx === i)) return;
    const current = counts[i] || 0;
    if (current === 0 && p.inv > 0) {
      needsOrder.push({ ...p, idx: i, current: 0, needed: p.inv });
    }
  });

  if (needsOrder.length === 0) {
    document.getElementById('pedirList').innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:var(--gray)">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <h3 style="color:var(--green)">Todo surtido</h3>
        <p>No hay productos pendientes de ordenar</p>
      </div>`;
    return;
  }

  // Group by supplier
  const bySupplier = {};
  needsOrder.forEach(p => {
    const s = p.s || 'Sin tienda';
    if (!bySupplier[s]) bySupplier[s] = [];
    bySupplier[s].push(p);
  });

  let html = `<div style="padding:8px 4px;font-size:13px;color:var(--gray);text-align:center">${needsOrder.length} productos por ordenar · ${Object.keys(bySupplier).length} proveedores</div>`;

  Object.keys(bySupplier).sort().forEach(supplier => {
    const items = bySupplier[supplier];
    const existingOrder = orders.find(o => o.supplier === supplier && o.status === 'ordered');
    const orderBadge = existingOrder ? '<span class="status-badge status-ordered">📦 Ordenado</span>' : '';

    // Determine primary fulfillment mode from items
    const modes = {};
    items.forEach(p => { modes[p.f || 'Ir a tienda'] = (modes[p.f || 'Ir a tienda'] || 0) + 1; });
    const primaryMode = Object.keys(modes).sort((a,b) => modes[b] - modes[a])[0];

    const itemList = items.map(p =>
      `<div style="display:flex;justify-content:space-between;padding:2px 0"><span>${p.n}</span><span style="font-weight:600;color:var(--orange)">${p.needed} ${p.u||''}</span></div>`
    ).join('');

    // Action buttons based on fulfillment mode
    let actions = '';
    if (primaryMode === 'Pedido domicilio') {
      if (existingOrder) {
        actions = `<button class="btn-receive" onclick="markOrderReceiving('${supplier.replace(/'/g,"\\'")}')">📦 Recibir</button>`;
      } else {
        actions = `<button class="btn-pedido" onclick="placeOrder('${supplier.replace(/'/g,"\\'")}')">📦 Marcar como Ordenado</button>`;
      }
    } else if (primaryMode === 'Ir a tienda') {
      actions = `<button class="btn-ir" onclick="copySupplierList('${supplier.replace(/'/g,"\\'")}')">📋 Copiar lista</button>`;
    }

    // WhatsApp button for suppliers that have it
    const waItems = items.map(p => `• ${p.n}: ${p.needed} ${p.u||'unid'}`).join('\n');
    const waMsg = encodeURIComponent(`Hola, pedido de Natural Balance:\n\n${waItems}\n\nGracias!`);
    actions += ` <button class="btn-whatsapp" onclick="window.open('https://wa.me/?text=${waMsg}','_blank')">💬 WhatsApp</button>`;

    html += `
      <div class="order-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="supplier">${supplier}</div>
          ${orderBadge}
        </div>
        <div class="order-meta">${items.length} productos · ${primaryMode}</div>
        <div class="order-items" style="margin:8px 0">${itemList}</div>
        <div class="order-actions">${actions}</div>
      </div>`;
  });

  document.getElementById('pedirList').innerHTML = html;
}

function placeOrder(supplier) {
  const items = [];
  PRODUCTS.forEach((p, i) => {
    if ((p.s || '') !== supplier) return;
    const current = counts[i] || 0;
    const needed = (p.max > 0 && current < p.max) ? p.max - current : (current < p.inv ? p.inv - current : 0);
    if (needed > 0 || (current === 0 && p.inv > 0)) {
      items.push({ name: p.n, qty: needed || p.inv, unit: p.u || '' });
    }
  });

  orders.push({
    id: 'ORD' + Date.now(),
    supplier,
    items,
    mode: 'Pedido domicilio',
    status: 'ordered',
    ordered_at: new Date().toISOString()
  });
  saveOrders();
  renderPedir();
  toast(`📦 Pedido a ${supplier} registrado`);
}

function copySupplierList(supplier) {
  const items = [];
  PRODUCTS.forEach((p, i) => {
    if ((p.s || '') !== supplier) return;
    const current = counts[i] || 0;
    const needed = (p.max > 0 && current < p.max) ? p.max - current : (current < p.inv ? p.inv - current : 0);
    if (needed > 0 || (current === 0 && p.inv > 0)) {
      items.push(`• ${p.n}: ${needed || p.inv} ${p.u || 'unid'}`);
    }
  });
  const text = `${supplier}\n${items.join('\n')}`;
  navigator.clipboard.writeText(text).then(() => toast('📋 Lista copiada'));
}

// ============ RECIBIR (RECEIVING) VIEW ============
let receivingOrderId = null;

function showRecibir() {
  showView('viewRecibir');
  document.getElementById('headerSub').textContent = 'Recibir pedidos';
  document.getElementById('backBtn').style.display = 'block';
  renderRecibir();
}

function renderRecibir() {
  const pending = orders.filter(o => o.status === 'ordered');
  const recent = orders.filter(o => o.status === 'received').sort((a,b) => (b.received_at||'').localeCompare(a.received_at||'')).slice(0, 5);

  let html = '';

  if (pending.length === 0 && recent.length === 0) {
    html = `<div style="text-align:center;padding:40px 20px;color:var(--gray)">
      <div style="font-size:48px;margin-bottom:12px">📦</div>
      <p>No hay pedidos pendientes por recibir</p>
      <p style="font-size:12px;margin-top:8px">Los pedidos aparecerán aquí cuando se ordenen desde "Pedir"</p>
    </div>`;
  }

  if (pending.length > 0) {
    html += `<div style="padding:8px 4px;font-size:14px;font-weight:600;color:var(--dark)">📦 Por Recibir (${pending.length})</div>`;
    pending.forEach(order => {
      const itemsHtml = order.items.map(it => `<div style="padding:1px 0">${it.name} · <strong>${it.qty} ${it.unit}</strong></div>`).join('');
      const ago = timeAgo(order.ordered_at);
      html += `
        <div class="order-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="supplier">${order.supplier}</div>
            <span class="status-badge status-ordered">Ordenado ${ago}</span>
          </div>
          <div class="order-items" style="margin:6px 0;font-size:12px">${itemsHtml}</div>
          <div class="order-actions">
            <button class="btn-receive" onclick="openReceiveModal('${order.id}')">✅ Recibir (15s)</button>
          </div>
        </div>`;
    });
  }

  if (recent.length > 0) {
    html += `<div style="padding:16px 4px 8px;font-size:14px;font-weight:600;color:var(--gray)">✅ Recibidos recientes</div>`;
    recent.forEach(order => {
      const ago = timeAgo(order.received_at);
      html += `
        <div class="order-card" style="opacity:.7">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="supplier">${order.supplier}</div>
            <span class="status-badge status-received">Recibido ${ago}</span>
          </div>
          <div class="order-meta">${order.items.length} productos · Recibió: ${order.receiver||'—'}${order.notes?' · '+order.notes:''}</div>
        </div>`;
    });
  }

  document.getElementById('recibirList').innerHTML = html;
}

function openReceiveModal(orderId) {
  receivingOrderId = orderId;
  const order = orders.find(o => o.id === orderId);
  if (!order) return;

  document.getElementById('receiveModalInfo').innerHTML = `
    <div style="background:#e8eaf6;border-radius:10px;padding:12px;margin-bottom:12px">
      <strong>${order.supplier}</strong>
      <div style="font-size:12px;color:var(--gray);margin-top:4px">${order.items.length} productos · Ordenado ${timeAgo(order.ordered_at)}</div>
    </div>`;

  // Populate receivers dropdown
  const sel = document.getElementById('receiverSelect');
  sel.innerHTML = '<option value="">— Seleccionar —</option>' +
    receivers.map(r => `<option value="${r}">${r}</option>`).join('') +
    '<option value="__other__">+ Otro nombre</option>';

  document.getElementById('receivePhoto').value = '';
  document.getElementById('receiveNotes').value = '';
  document.getElementById('receiveModal').classList.add('open');
}
function closeReceiveModal() { document.getElementById('receiveModal').classList.remove('open'); receivingOrderId = null; }

async function confirmReceive() {
  const order = orders.find(o => o.id === receivingOrderId);
  if (!order) return;

  let receiver = document.getElementById('receiverSelect').value;
  if (receiver === '__other__') {
    receiver = prompt('Nombre de quien recibe:');
    if (receiver && !receivers.includes(receiver)) {
      receivers.push(receiver);
    }
  }
  if (!receiver) { toast('Selecciona quién recibe'); return; }

  order.status = 'received';
  order.received_at = new Date().toISOString();
  order.receiver = receiver;
  order.notes = document.getElementById('receiveNotes').value.trim();

  // Optional photo
  const photoInput = document.getElementById('receivePhoto');
  if (photoInput.files[0]) {
    try {
      const img = await loadImage(photoInput.files[0]);
      const canvas = document.createElement('canvas');
      const scale = Math.min(800 / img.naturalWidth, 1);
      canvas.width = Math.round(img.naturalWidth * scale);
      canvas.height = Math.round(img.naturalHeight * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      order.foto = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
    } catch(e) { console.log('Photo error:', e); }
  }

  saveOrders();
  closeReceiveModal();
  renderRecibir();
  toast(`✅ ${order.supplier} recibido por ${receiver}`);
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function markOrderReceiving(supplier) {
  const order = orders.find(o => o.supplier === supplier && o.status === 'ordered');
  if (order) openReceiveModal(order.id);
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `hace ${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `hace ${hrs}h`;
  const days = Math.floor(hrs / 24);
  return `hace ${days}d`;
}

// ============ NAVIGATION (updated) ============
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  document.getElementById('summaryBar').style.display = (viewId === 'viewSections') ? 'block' : 'none';
}

// Initialize the app
loadOrders();
init();
</script>
