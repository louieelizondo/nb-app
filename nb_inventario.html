<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="nb-brand.css">
<title>NB Inventario</title>
<style>
:root {
  --green:#2d6a4f; --green-light:#40916c; --green-bg:#d8f3dc;
  --red:#d00000; --red-bg:#ffd6d6;
  --orange:#e85d04; --orange-bg:#fff3e0;
  --blue:#0077b6; --blue-bg:#caf0f8;
  --gray:#6c757d; --gray-bg:#f8f9fa; --gray-border:#dee2e6;
  --dark:#212529; --white:#fff;
  --radius:12px; --shadow:0 2px 8px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:var(--dark);-webkit-tap-highlight-color:transparent}

/* Header */
.header{background:var(--green);color:var(--white);padding:16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:20px;font-weight:700}
.header .subtitle{font-size:12px;opacity:.8;margin-top:2px}
.back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:4px 8px;display:none}

/* Search */
.search-wrap{padding:12px 12px 0;max-width:700px;margin:0 auto}
.search-wrap input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-border);border-radius:10px;font-size:14px;background:var(--white)}
.search-wrap input:focus{border-color:var(--green);outline:none}

/* Filter chips */
.filters{padding:8px 12px;display:flex;gap:6px;overflow-x:auto;max-width:700px;margin:0 auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.chip{font-size:12px;padding:6px 14px;border:1.5px solid var(--gray-border);border-radius:20px;background:var(--white);cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:500;transition:all .15s}
.chip.active{background:var(--green);color:var(--white);border-color:var(--green)}

/* Location grid */
.loc-grid{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;max-width:700px;margin:0 auto;padding-bottom:80px}
.loc-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s;border-left:4px solid var(--green)}
.loc-card:active{transform:scale(.97)}
.loc-card .loc-icon{font-size:24px;margin-bottom:6px}
.loc-card .loc-name{font-size:14px;font-weight:600}
.loc-card .loc-meta{font-size:11px;color:var(--gray);margin-top:4px}
.loc-card .loc-count{font-size:22px;font-weight:700;color:var(--green);float:right;margin-top:-30px}
.loc-card.needs-buy{border-left-color:var(--orange)}
.loc-card .buy-badge{display:inline-block;font-size:10px;background:var(--orange-bg);color:var(--orange);padding:2px 6px;border-radius:8px;font-weight:600;margin-top:4px}

/* Product list */
.product-list{padding:12px;max-width:700px;margin:0 auto;padding-bottom:120px}
.product-row{background:var(--white);border-radius:var(--radius);padding:12px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.product-info{flex:1;min-width:0}
.product-name{font-size:14px;font-weight:600;word-wrap:break-word;overflow-wrap:break-word;line-height:1.3}
.product-meta{font-size:11px;color:var(--gray);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.badge{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-gray{background:var(--gray-bg);color:var(--gray)}

/* Stepper with unit label */
.count-block{display:flex;align-items:center;gap:6px;flex-shrink:0}
.stepper{display:flex;align-items:center;flex-shrink:0}
.stepper button{width:38px;height:38px;border:none;background:var(--gray-bg);color:var(--dark);font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.stepper button:first-child{border-radius:8px 0 0 8px}
.stepper button:last-child{border-radius:0 8px 8px 0}
.stepper button:active{background:var(--gray-border)}
.stepper input{width:52px;height:38px;border:1.5px solid var(--gray-border);border-left:none;border-right:none;text-align:center;font-size:16px;font-weight:700;-moz-appearance:textfield}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none}
.stepper.dirty input{background:#fffde7;border-color:#ffcc02}
.unit-label{font-size:11px;font-weight:600;color:var(--gray);max-width:50px;line-height:1.2;text-align:left}

/* Purchase badge */
.purchase-badge{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--orange);white-space:nowrap;cursor:default}
.purchase-badge .arrow{font-size:14px}

/* Max editor */
.max-badge{font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px;font-weight:600}
.max-set{background:var(--green-bg);color:var(--green)}
.max-unset{background:#fff3cd;color:#856404}
.max-editor{display:none;width:100%;padding:8px 0 0;border-top:1px dashed var(--gray-border);margin-top:6px}
.max-editor.open{display:flex;align-items:center;gap:8px}
.max-editor label{font-size:11px;font-weight:700;color:var(--gray)}
.max-editor input{width:70px;padding:6px;border:1.5px solid var(--gray-border);border-radius:6px;font-size:14px;font-weight:600;text-align:center}
.max-editor button{background:var(--green);color:var(--white);border:none;border-radius:6px;padding:6px 12px;font-size:14px;font-weight:700;cursor:pointer}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);padding:12px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.12);z-index:90;display:none}
.save-bar .inner{max-width:700px;margin:0 auto;display:flex;gap:10px;align-items:center}
.save-bar .stats{flex:1;font-size:13px;color:var(--gray)}
.save-bar .stats strong{color:var(--green)}
.btn-save{background:var(--green);color:var(--white);border:none;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.btn-save:active{background:var(--green-light)}
.btn-save:disabled{opacity:.5;cursor:default}
.btn-shop{background:var(--orange);color:var(--white);border:none;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.btn-shop:active{opacity:.9}

/* Shop floating button */
.fab-shop{position:fixed;bottom:20px;right:20px;background:var(--orange);color:var(--white);border:none;width:60px;height:60px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(232,93,4,.35);z-index:80;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.fab-shop:active{transform:scale(.92)}
.fab-shop .fab-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:var(--white);font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ═══ Shopping list — per-supplier cards ═══ */
.shop-header{padding:16px;text-align:center}
.shop-header h2{font-size:18px;color:var(--dark)}
.shop-header .shop-date{font-size:12px;color:var(--gray);margin-top:2px}

.supplier-card{background:var(--white);border-radius:var(--radius);margin:0 12px 12px;max-width:700px;box-shadow:var(--shadow);overflow:hidden}
.supplier-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--green-bg);cursor:pointer;gap:8px}
.supplier-header .sup-name{font-size:14px;font-weight:700;color:var(--green);flex:1;min-width:0}
.supplier-header .sup-count{font-size:11px;color:var(--gray);white-space:nowrap}
.supplier-header .sup-toggle{font-size:16px;color:var(--gray);transition:transform .2s}
.supplier-header .sup-toggle.collapsed{transform:rotate(-90deg)}
.supplier-body{padding:0 14px}
.supplier-body.collapsed{display:none}
.supplier-card.bought{opacity:.5}
.supplier-card.bought .supplier-header{background:var(--gray-bg)}
.supplier-card.bought .sup-name{text-decoration:line-through}
.supplier-card.discarded{display:none}

.shop-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.shop-item:last-child{border-bottom:none}
.shop-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);flex-shrink:0;cursor:pointer}
.shop-item .item-name{flex:1;min-width:0;line-height:1.3;word-wrap:break-word}
.shop-item .item-qty-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.shop-item .item-qty-input{width:48px;padding:4px;border:1.5px solid var(--gray-border);border-radius:6px;font-size:13px;font-weight:700;text-align:center;color:var(--orange)}
.shop-item .item-unit{font-size:11px;color:var(--gray);font-weight:600;max-width:50px}
.shop-item.checked .item-name{text-decoration:line-through;opacity:.4}

.supplier-actions{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--gray-border);flex-wrap:wrap}
.supplier-actions button{flex:1;min-width:0;padding:10px 6px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.btn-sup-wa{background:#25d366;color:var(--white);border:none}
.btn-sup-bought{background:var(--green);color:var(--white);border:none}
.btn-sup-discard{background:var(--white);color:var(--gray);border:1.5px solid var(--gray-border)}

.shop-global-actions{padding:12px;max-width:700px;margin:0 auto;padding-bottom:40px}
.shop-global-actions button{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-close{background:var(--white);color:var(--gray);border:1.5px solid var(--gray-border)}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--gray)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--gray-border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--gray)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;color:var(--dark);margin-bottom:8px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--white);padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;display:none;white-space:nowrap}
.toast.show{display:block;animation:fadeInOut 2.5s ease}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

/* Views */
.view{display:none}
.view.active{display:block}

/* Responsive — Tablet */
@media(min-width:768px){
  .header h1{font-size:24px}
  .loc-grid{max-width:900px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .product-list{max-width:900px}
  .save-bar .inner{max-width:900px}
  .supplier-card{max-width:900px;margin:0 auto 12px}
  .shop-global-actions{max-width:900px}
  .stepper button{width:44px;height:44px;font-size:22px}
  .stepper input{width:60px;height:44px;font-size:18px}
}
/* Desktop */
@media(min-width:1024px){
  .loc-grid{max-width:1100px}
  .product-list{max-width:1100px}
  .save-bar .inner{max-width:1100px}
}
/* Small phone */
@media(max-width:480px){
  .header{padding:12px}
  .header h1{font-size:18px}
  .loc-card{padding:12px}
  .loc-card .loc-name{font-size:13px}
  .stepper button{width:34px;height:34px}
  .stepper input{width:46px;height:34px;font-size:14px}
  .supplier-actions button{font-size:11px;padding:8px 4px}
}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
  <h1>NB Inventario</h1>
  <div class="subtitle" id="headerSub">Cargando productos...</div>
</div>

<!-- VIEW: Home -->
<div class="view active" id="viewHome">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="filterHome()">
  </div>
  <div class="filters" id="areaFilters"></div>
  <div class="loc-grid" id="locGrid">
    <div class="loading"><div class="spinner"></div><p>Cargando inventario...</p></div>
  </div>
  <button class="fab-shop" id="fabShop" onclick="showShop()" style="display:none">
    🛒<span class="fab-badge" id="fabBadge">0</span>
  </button>
</div>

<!-- VIEW: Count -->
<div class="view" id="viewCount">
  <div class="product-list" id="productList"></div>
  <div class="save-bar" id="saveBar">
    <div class="inner">
      <div class="stats" id="saveStats"></div>
      <button class="btn-shop" onclick="showShop()">🛒</button>
      <button class="btn-save" id="btnSave" onclick="saveCounts()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- VIEW: Shopping List -->
<div class="view" id="viewShop">
  <div class="shop-header">
    <h2>🛒 Lista de Compras</h2>
    <div class="shop-date" id="shopDate"></div>
  </div>
  <div id="shopContent"></div>
  <div class="shop-global-actions" id="shopActions"></div>
</div>

<div class="toast" id="toast"></div>

<script src="nb_auth.js"></script>
<script>
// ════════════════════════════════════════
// STATE — everything in memory, nothing in localStorage
// ════════════════════════════════════════
let products = [];        // from API
let dirty = {};           // { row: true } — changed since load
let countEdits = {};      // { row: newQty } — count changes
let maxEdits = {};        // { row: newMax } — max changes
let shopChecked = {};     // { row: true } — checked off in shopping list
let shopQtyOverrides = {};// { row: qty } — manual qty overrides in shopping list
let shopDiscarded = {};   // { supplier: true } — discarded supplier sections
let shopBought = {};      // { supplier: true } — bought supplier sections
let currentLocation = null;
let currentArea = '';     // filter
let searchQuery = '';

const LOC_ICONS = {
  'Cocina':'🍳','Almacén':'📦','Cuarto Frio Materia Prima':'🧊','Cuarto Frio Ventas':'🧊',
  'Congelador (Himalaya)':'❄️','Congelador (ataúd)':'❄️','Producción':'🏭','Tienda':'🏪',
  'Comedor':'🍽️','Oficina':'🗂️','Proveedores':'🚚','Granja':'🌾','Casa 1':'🏠','Sin ubicación':'📍'
};

// ════════════════════════════════════════
// API
// ════════════════════════════════════════
function getAPI() {
  return 'https://script.google.com/macros/s/AKfycbxQ7BzFITQnxyndvo2q7Xa1-Sc-yX5S8JGRc1mIbd4ye0rSpN2I2qx1zAjzRqbPXNeL/exec';
}

async function api(action, body) {
  const url = getAPI();
  if (!url) throw new Error('Script URL not configured');
  if (body) {
    body.action = action;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    });
    return resp.json();
  } else {
    const resp = await fetch(url + '?action=' + action);
    return resp.json();
  }
}

// ════════════════════════════════════════
// HELPERS — unit display
// ════════════════════════════════════════
function getCountUnit(p) {
  return p.unidad_conteo || p.unidad || '';
}

function getPurchaseUnit(p) {
  return p.unidad_compra || p.unidad_conteo || p.unidad || '';
}

// Convert counting units to purchase units
// factor = how many counting units per 1 purchase unit
function toPurchaseQty(countQty, factor) {
  if (!factor || factor <= 0) factor = 1;
  if (factor === 1) return countQty;
  return Math.round(countQty / factor); // whole purchase units (.5+ up, .4- down)
}

// ════════════════════════════════════════
// LOAD PRODUCTS FROM SHEET
// ════════════════════════════════════════
async function loadProducts() {
  try {
    const data = await api('list_inventory');
    if (!data.ok) throw new Error(data.error || 'API error');
    products = data.products;
    // Initialize countEdits with current values
    products.forEach(p => { countEdits[p.row] = p.actual; });
    document.getElementById('headerSub').textContent = products.length + ' productos activos';
    renderHome();
    updateFab();
  } catch (e) {
    document.getElementById('locGrid').innerHTML =
      '<div class="empty-state"><div class="emoji">⚠️</div><h3>Error al cargar</h3><p>' + e.message + '</p></div>';
  }
}

// ════════════════════════════════════════
// HOME VIEW
// ════════════════════════════════════════
function renderHome() {
  renderAreaFilters();
  renderLocationGrid();
}

function renderAreaFilters() {
  const areas = new Set();
  products.forEach(p => { if (p.area) areas.add(p.area); });
  let html = '<button class="chip ' + (!currentArea ? 'active' : '') + '" onclick="setArea(\'\')">Todos</button>';
  areas.forEach(a => {
    html += '<button class="chip ' + (currentArea === a ? 'active' : '') + '" onclick="setArea(\'' + a.replace(/'/g, "\\'") + '\')">' + a + '</button>';
  });
  document.getElementById('areaFilters').innerHTML = html;
}

function setArea(a) {
  currentArea = a;
  renderHome();
}

function filterHome() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  renderLocationGrid();
}

function getFilteredProducts() {
  return products.filter(p => {
    if (currentArea && p.area !== currentArea) return false;
    if (searchQuery && !p.nombre.toLowerCase().includes(searchQuery) && !p.proveedor.toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

function renderLocationGrid() {
  const filtered = getFilteredProducts();

  // If searching, show flat product list instead of location grid
  if (searchQuery) {
    renderSearchResults(filtered);
    return;
  }

  // Group by ubicacion
  const locMap = {};
  filtered.forEach(p => {
    const loc = p.ubicacion || 'Sin ubicación';
    if (!locMap[loc]) locMap[loc] = { products: [], needsBuy: 0 };
    locMap[loc].products.push(p);
    const current = countEdits[p.row] !== undefined ? countEdits[p.row] : p.actual;
    if (p.max > 0 && current < p.max) locMap[loc].needsBuy++;
  });

  if (Object.keys(locMap).length === 0) {
    document.getElementById('locGrid').innerHTML =
      '<div class="empty-state"><div class="emoji">📭</div><h3>Sin productos</h3><p>No hay productos para mostrar</p></div>';
    return;
  }

  // Sort: locations with items to buy first, then alphabetical
  const locKeys = Object.keys(locMap).sort((a, b) => {
    const aBuy = locMap[a].needsBuy > 0 ? 0 : 1;
    const bBuy = locMap[b].needsBuy > 0 ? 0 : 1;
    if (aBuy !== bBuy) return aBuy - bBuy;
    return a.localeCompare(b, 'es');
  });

  let html = '';
  locKeys.forEach(loc => {
    const info = locMap[loc];
    const icon = LOC_ICONS[loc] || LOC_ICONS[loc.split(',')[0].trim()] || '📍';
    const buyBadge = info.needsBuy > 0 ? '<span class="buy-badge">Comprar: ' + info.needsBuy + '</span>' : '';
    const lastCount = info.products.reduce((latest, p) => p.fecha_conteo > latest ? p.fecha_conteo : latest, '');
    const metaText = lastCount ? 'Contado: ' + lastCount : 'Sin contar';

    html += '<div class="loc-card ' + (info.needsBuy > 0 ? 'needs-buy' : '') + '" onclick="showCount(\'' + loc.replace(/'/g, "\\'") + '\')">' +
      '<div class="loc-icon">' + icon + '</div>' +
      '<div class="loc-count">' + info.products.length + '</div>' +
      '<div class="loc-name">' + loc + '</div>' +
      '<div class="loc-meta">' + metaText + ' ' + buyBadge + '</div>' +
    '</div>';
  });
  document.getElementById('locGrid').innerHTML = html;
}

function renderSearchResults(filtered) {
  if (filtered.length === 0) {
    document.getElementById('locGrid').innerHTML =
      '<div class="empty-state"><div class="emoji">🔍</div><h3>Sin resultados</h3></div>';
    return;
  }
  // Show as a simple list
  let html = '<div style="grid-column:1/-1;padding:4px">';
  filtered.slice(0, 50).forEach(p => {
    const loc = p.ubicacion || 'Sin ubicación';
    const icon = LOC_ICONS[loc] || '📍';
    html += '<div class="loc-card" style="margin-bottom:6px;border-left-color:var(--blue)" onclick="showCount(\'' + loc.replace(/'/g, "\\'") + '\')">' +
      '<div class="loc-icon">' + icon + '</div>' +
      '<div class="loc-name">' + p.nombre + '</div>' +
      '<div class="loc-meta">' + p.proveedor + ' · ' + loc + '</div>' +
    '</div>';
  });
  if (filtered.length > 50) html += '<div style="text-align:center;padding:12px;color:var(--gray)">...y ' + (filtered.length - 50) + ' más</div>';
  html += '</div>';
  document.getElementById('locGrid').innerHTML = html;
}

// ════════════════════════════════════════
// COUNT VIEW
// ════════════════════════════════════════
function showCount(location) {
  currentLocation = location;
  showView('viewCount');
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerSub').textContent = location;
  renderProductList();
  document.getElementById('saveBar').style.display = 'block';
  updateSaveStats();
}

function renderProductList() {
  const filtered = products
    .filter(p => (p.ubicacion || 'Sin ubicación') === currentLocation)
    .filter(p => !currentArea || p.area === currentArea)
    .sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'));

  if (filtered.length === 0) {
    document.getElementById('productList').innerHTML =
      '<div class="empty-state"><div class="emoji">📭</div><h3>Sin productos en esta ubicación</h3></div>';
    return;
  }

  let html = '';
  filtered.forEach(p => {
    const count = countEdits[p.row] !== undefined ? countEdits[p.row] : p.actual;
    const max = maxEdits[p.row] !== undefined ? maxEdits[p.row] : p.max;
    const toBuy = max > 0 && count < max ? Math.round((max - count) * 10) / 10 : 0;
    const isDirty = dirty[p.row];
    const maxBadgeClass = max > 0 ? 'max-set' : 'max-unset';
    const unit = getCountUnit(p);
    const maxBadgeText = max > 0 ? 'Máx: ' + max + (unit ? ' ' + unit : '') : '⚙️ Fijar máx';

    html += '<div class="product-row" id="pr-' + p.row + '">' +
      '<div class="product-info">' +
        '<div class="product-name">' + p.nombre + '</div>' +
        '<div class="product-meta">' +
          '<span class="max-badge ' + maxBadgeClass + '" onclick="toggleMaxEditor(' + p.row + ')">' + maxBadgeText + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="count-block">' +
        '<div class="stepper ' + (isDirty ? 'dirty' : '') + '">' +
          '<button onclick="adj(' + p.row + ',-1)">−</button>' +
          '<input type="number" id="cnt-' + p.row + '" value="' + count + '" ' +
            'onchange="setCount(' + p.row + ',this.value)" inputmode="decimal" step="0.5" min="0">' +
          '<button onclick="adj(' + p.row + ',1)">+</button>' +
        '</div>' +
        (unit ? '<div class="unit-label">' + unit + '</div>' : '') +
      '</div>' +
      (toBuy > 0 ? '<div class="purchase-badge"><span class="arrow">→</span> ' + toBuy + ' ' + (unit || '') + '</div>' : '') +
      '<div class="max-editor" id="mxe-' + p.row + '">' +
        '<label>Máx:</label>' +
        '<input type="number" id="mxi-' + p.row + '" value="' + max + '" step="0.5" min="0" inputmode="decimal">' +
        (unit ? '<span style="font-size:12px;color:var(--gray)">' + unit + '</span>' : '') +
        '<button onclick="saveMax(' + p.row + ')">✓</button>' +
      '</div>' +
    '</div>';
  });

  document.getElementById('productList').innerHTML = html;
}

// ════════════════════════════════════════
// COUNTING
// ════════════════════════════════════════
function adj(row, delta) {
  const input = document.getElementById('cnt-' + row);
  let val = parseFloat(input.value) || 0;
  if (val % 1 !== 0) {
    val = delta > 0 ? Math.ceil(val) : Math.floor(val);
  } else {
    val += delta;
  }
  val = Math.max(0, val);
  input.value = val;
  countEdits[row] = val;
  dirty[row] = true;
  input.closest('.stepper').classList.add('dirty');

  // Update purchase badge inline
  const p = products.find(x => x.row === row);
  if (p) {
    const max = maxEdits[row] !== undefined ? maxEdits[row] : p.max;
    const toBuy = max > 0 && val < max ? Math.round((max - val) * 10) / 10 : 0;
    const unit = getCountUnit(p);
    const pr = document.getElementById('pr-' + row);
    const existing = pr.querySelector('.purchase-badge');
    if (toBuy > 0) {
      const badgeHtml = '<span class="arrow">→</span> ' + toBuy + ' ' + (unit || '');
      if (existing) {
        existing.innerHTML = badgeHtml;
      } else {
        const badge = document.createElement('div');
        badge.className = 'purchase-badge';
        badge.innerHTML = badgeHtml;
        pr.querySelector('.max-editor').before(badge);
      }
    } else if (existing) {
      existing.remove();
    }
  }

  updateSaveStats();
}

function setCount(row, val) {
  const num = parseFloat(val) || 0;
  countEdits[row] = Math.max(0, num);
  dirty[row] = true;
  document.getElementById('cnt-' + row).closest('.stepper').classList.add('dirty');
  updateSaveStats();
}

function toggleMaxEditor(row) {
  const editor = document.getElementById('mxe-' + row);
  const isOpen = editor.classList.contains('open');
  // Close all others
  document.querySelectorAll('.max-editor.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) {
    editor.classList.add('open');
    const input = document.getElementById('mxi-' + row);
    input.select();
    input.focus();
  }
}

function saveMax(row) {
  const val = parseFloat(document.getElementById('mxi-' + row).value) || 0;
  maxEdits[row] = val;
  dirty[row] = true;

  // Update badge
  const p = products.find(x => x.row === row);
  const unit = p ? getCountUnit(p) : '';
  const badge = document.getElementById('pr-' + row).querySelector('.max-badge');
  if (badge) {
    badge.className = 'max-badge ' + (val > 0 ? 'max-set' : 'max-unset');
    badge.textContent = val > 0 ? 'Máx: ' + val + (unit ? ' ' + unit : '') : '⚙️ Fijar máx';
  }

  // Close editor
  document.getElementById('mxe-' + row).classList.remove('open');

  // Update purchase badge
  if (p) {
    const count = countEdits[row] !== undefined ? countEdits[row] : p.actual;
    const toBuy = val > 0 && count < val ? Math.round((val - count) * 10) / 10 : 0;
    const pr = document.getElementById('pr-' + row);
    const existing = pr.querySelector('.purchase-badge');
    if (toBuy > 0) {
      const badgeHtml = '<span class="arrow">→</span> ' + toBuy + ' ' + (unit || '');
      if (existing) existing.innerHTML = badgeHtml;
      else {
        const b = document.createElement('div');
        b.className = 'purchase-badge';
        b.innerHTML = badgeHtml;
        pr.querySelector('.max-editor').before(b);
      }
    } else if (existing) existing.remove();
  }

  updateSaveStats();
  toast('✓ Máx: ' + val);

  // Also push to Sheet immediately
  api('update_inv_field', { row, field: 'max', value: val }).catch(() => {});
}

function updateSaveStats() {
  const dirtyCount = Object.keys(dirty).length;
  const toBuyCount = getShoppingItems().length;
  document.getElementById('saveStats').innerHTML =
    '<strong>' + dirtyCount + '</strong> cambios sin guardar' +
    (toBuyCount > 0 ? ' · <strong style="color:var(--orange)">' + toBuyCount + '</strong> por comprar' : '');
  document.getElementById('btnSave').disabled = dirtyCount === 0;
  updateFab();
}

// ════════════════════════════════════════
// SAVE COUNTS TO SHEET
// ════════════════════════════════════════
async function saveCounts() {
  const dirtyRows = Object.keys(dirty).map(Number);
  if (dirtyRows.length === 0) { toast('Sin cambios'); return; }

  const btn = document.getElementById('btnSave');
  btn.textContent = '⏳ Guardando...';
  btn.disabled = true;

  const items = dirtyRows.map(row => {
    const p = products.find(x => x.row === row);
    return {
      row,
      nombre: p ? p.nombre : '',
      cantidad: countEdits[row] !== undefined ? countEdits[row] : 0,
      ubicacion: p ? p.ubicacion : '',
      area: p ? p.area : '',
      new_max: maxEdits[row] !== undefined ? maxEdits[row] : undefined
    };
  });

  try {
    const data = await api('save_inventory_counts', {
      items,
      quien: 'Louie',
      device: /Mobile/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
    });

    if (data.ok) {
      // Update local product data with saved values
      dirtyRows.forEach(row => {
        const p = products.find(x => x.row === row);
        if (p) {
          p.actual = countEdits[row] !== undefined ? countEdits[row] : p.actual;
          if (maxEdits[row] !== undefined) p.max = maxEdits[row];
          p.fecha_conteo = new Date().toISOString().slice(0, 10);
        }
      });

      dirty = {};
      maxEdits = {};
      toast('✅ ' + items.length + ' productos guardados');
      renderProductList();
      updateSaveStats();
    } else {
      throw new Error(data.error || 'Error al guardar');
    }
  } catch (e) {
    toast('❌ ' + e.message);
  }

  btn.textContent = '💾 Guardar';
  btn.disabled = Object.keys(dirty).length === 0;
}

// ════════════════════════════════════════
// SHOPPING LIST — per-supplier cards
// ════════════════════════════════════════
function getShoppingItems() {
  return products.filter(p => {
    const count = countEdits[p.row] !== undefined ? countEdits[p.row] : p.actual;
    const max = maxEdits[p.row] !== undefined ? maxEdits[p.row] : p.max;
    return max > 0 && count < max;
  }).map(p => {
    const count = countEdits[p.row] !== undefined ? countEdits[p.row] : p.actual;
    const max = maxEdits[p.row] !== undefined ? maxEdits[p.row] : p.max;
    const needCount = Math.round((max - count) * 10) / 10; // in counting units
    const factor = p.factor || 1;
    const purchaseQty = toPurchaseQty(needCount, factor);
    return {
      ...p, count, needCount,
      toBuy: purchaseQty,
      buyUnit: getPurchaseUnit(p),
      countUnit: getCountUnit(p)
    };
  });
}

function showShop() {
  showView('viewShop');
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerSub').textContent = 'Lista de Compras';
  shopChecked = {};
  shopQtyOverrides = {};
  shopDiscarded = {};
  shopBought = {};
  renderShopList();
}

function renderShopList() {
  const items = getShoppingItems();
  const now = new Date();
  document.getElementById('shopDate').textContent =
    now.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  if (items.length === 0) {
    document.getElementById('shopContent').innerHTML =
      '<div class="empty-state"><div class="emoji">✅</div><h3>Todo surtido</h3><p>No hay productos por comprar</p></div>';
    document.getElementById('shopActions').innerHTML =
      '<button class="btn-close" onclick="goBack()">Cerrar</button>';
    return;
  }

  // Group by supplier
  const bySupplier = {};
  items.forEach(item => {
    const s = item.proveedor || 'Sin proveedor';
    if (!bySupplier[s]) bySupplier[s] = [];
    bySupplier[s].push(item);
  });

  let html = '';
  Object.keys(bySupplier).sort().forEach(supplier => {
    const sitems = bySupplier[supplier];
    const sid = supplier.replace(/[^a-zA-Z0-9]/g, '_');
    const isBought = shopBought[supplier];
    const isDiscarded = shopDiscarded[supplier];

    html += '<div class="supplier-card' + (isBought ? ' bought' : '') + (isDiscarded ? ' discarded' : '') + '" id="sc-' + sid + '">' +
      '<div class="supplier-header" onclick="toggleSupplier(\'' + sid + '\')">' +
        '<span class="sup-name">🏪 ' + supplier + '</span>' +
        '<span class="sup-count">' + sitems.length + ' productos</span>' +
        '<span class="sup-toggle" id="st-' + sid + '">▼</span>' +
      '</div>' +
      '<div class="supplier-body" id="sb-' + sid + '">';

    sitems.sort((a, b) => a.nombre.localeCompare(b.nombre, 'es')).forEach(item => {
      const checked = shopChecked[item.row];
      const displayQty = shopQtyOverrides[item.row] !== undefined ? shopQtyOverrides[item.row] : item.toBuy;

      html += '<div class="shop-item ' + (checked ? 'checked' : '') + '" id="si-' + item.row + '">' +
        '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleShopItem(' + item.row + ')">' +
        '<span class="item-name">' + item.nombre + '</span>' +
        '<span class="item-qty-wrap">' +
          '<input type="number" class="item-qty-input" value="' + displayQty + '" ' +
            'step="0.5" min="0" inputmode="decimal" onchange="overrideShopQty(' + item.row + ',this.value)">' +
          '<span class="item-unit">' + item.buyUnit + '</span>' +
        '</span>' +
      '</div>';
    });

    html += '</div>' +
      '<div class="supplier-actions">' +
        '<button class="btn-sup-wa" onclick="sendSupplierWA(\'' + supplier.replace(/'/g, "\\'") + '\')">💬 WhatsApp</button>' +
        '<button class="btn-sup-bought" onclick="markSupplierBought(\'' + supplier.replace(/'/g, "\\'") + '\')">✅ Comprado</button>' +
        '<button class="btn-sup-discard" onclick="discardSupplier(\'' + supplier.replace(/'/g, "\\'") + '\')">🗑️</button>' +
      '</div>' +
    '</div>';
  });

  document.getElementById('shopContent').innerHTML = html;

  document.getElementById('shopActions').innerHTML =
    '<button class="btn-close" onclick="goBack()">Cerrar</button>';
}

function toggleSupplier(sid) {
  const body = document.getElementById('sb-' + sid);
  const toggle = document.getElementById('st-' + sid);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    toggle.classList.remove('collapsed');
  } else {
    body.classList.add('collapsed');
    toggle.classList.add('collapsed');
  }
}

function toggleShopItem(row) {
  shopChecked[row] = !shopChecked[row];
  const el = document.getElementById('si-' + row);
  if (el) el.classList.toggle('checked', shopChecked[row]);
}

function overrideShopQty(row, val) {
  shopQtyOverrides[row] = parseFloat(val) || 0;
}

// ═══ Per-supplier actions ═══

function sendSupplierWA(supplier) {
  const items = getShoppingItems().filter(i => (i.proveedor || 'Sin proveedor') === supplier);
  if (!items.length) return;

  const date = new Date().toLocaleDateString('es-MX');
  let text = '🛒 *Pedido NB — ' + supplier + '*\n📅 ' + date + '\n\n';

  items.sort((a, b) => a.nombre.localeCompare(b.nombre, 'es')).forEach(item => {
    const qty = shopQtyOverrides[item.row] !== undefined ? shopQtyOverrides[item.row] : item.toBuy;
    text += '• ' + item.nombre + ': *' + qty + ' ' + item.buyUnit + '*\n';
  });

  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

async function markSupplierBought(supplier) {
  const items = getShoppingItems().filter(i => (i.proveedor || 'Sin proveedor') === supplier);
  if (!items.length) return;
  if (!confirm('¿Marcar todo de ' + supplier + ' como comprado?')) return;

  // Set inventory to max for this supplier's items (or to override qty converted back)
  items.forEach(item => {
    const max = maxEdits[item.row] !== undefined ? maxEdits[item.row] : item.max;
    countEdits[item.row] = max;
    dirty[item.row] = true;
  });

  shopBought[supplier] = true;
  const sid = supplier.replace(/[^a-zA-Z0-9]/g, '_');
  const card = document.getElementById('sc-' + sid);
  if (card) card.classList.add('bought');

  toast('⏳ Guardando ' + supplier + '...');
  await saveCounts();
  updateFab();
}

function discardSupplier(supplier) {
  if (!confirm('¿Quitar ' + supplier + ' de la lista? (No guarda cambios)')) return;
  shopDiscarded[supplier] = true;
  const sid = supplier.replace(/[^a-zA-Z0-9]/g, '_');
  const card = document.getElementById('sc-' + sid);
  if (card) card.classList.add('discarded');
  toast('🗑️ ' + supplier + ' quitado');
}

function updateFab() {
  const count = getShoppingItems().length;
  const fab = document.getElementById('fabShop');
  const badge = document.getElementById('fabBadge');
  if (count > 0) {
    fab.style.display = 'flex';
    badge.textContent = count;
  } else {
    fab.style.display = 'none';
  }
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('saveBar').style.display = id === 'viewCount' ? 'block' : 'none';
  const fab = document.getElementById('fabShop');
  if (fab) fab.style.display = id === 'viewHome' && getShoppingItems().length > 0 ? 'flex' : 'none';
}

function goBack() {
  const current = document.querySelector('.view.active');
  if (current.id === 'viewShop' && currentLocation) {
    // Back from shop to count view
    showView('viewCount');
    document.getElementById('headerSub').textContent = currentLocation;
    document.getElementById('saveBar').style.display = 'block';
    return;
  }

  if (Object.keys(dirty).length > 0 && current.id === 'viewCount') {
    if (!confirm('Tienes cambios sin guardar. ¿Salir sin guardar?')) return;
  }

  currentLocation = null;
  showView('viewHome');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerSub').textContent = products.length + ' productos activos';
  renderHome();
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Wait for auth to be ready, then load
  if (typeof onNbAuthReady === 'function') {
    onNbAuthReady(loadProducts);
  } else {
    // Fallback: load after short delay
    setTimeout(loadProducts, 500);
  }
});
</script>
