<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NB Inventario</title>
<style>
:root {
  --green: #2d6a4f; --green-light: #40916c; --green-bg: #d8f3dc;
  --red: #d00000; --red-bg: #ffd6d6;
  --orange: #e85d04; --orange-bg: #fff3e0;
  --blue: #0077b6; --blue-bg: #caf0f8;
  --gray: #6c757d; --gray-bg: #f8f9fa; --gray-border: #dee2e6;
  --dark: #212529; --white: #fff;
  --radius: 12px; --shadow: 0 2px 8px rgba(0,0,0,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f0f2f5; color:var(--dark); -webkit-tap-highlight-color:transparent; }

/* Header */
.header { background:var(--green); color:var(--white); padding:16px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.header h1 { font-size:20px; font-weight:700; }
.header .subtitle { font-size:12px; opacity:.8; margin-top:2px; }

/* Back button */
.back-btn { position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--white); font-size:24px; cursor:pointer; padding:4px 8px; display:none; }

/* Route selection */
.routes { padding:16px; display:flex; flex-direction:column; gap:12px; max-width:500px; margin:0 auto; }
.route-card { background:var(--white); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); cursor:pointer; border:2px solid transparent; transition:all .2s; display:flex; align-items:center; gap:16px; }
.route-card:active { transform:scale(.98); }
.route-card .icon { font-size:36px; width:56px; height:56px; display:flex; align-items:center; justify-content:center; border-radius:12px; flex-shrink:0; }
.route-card .info h3 { font-size:16px; font-weight:600; }
.route-card .info p { font-size:13px; color:var(--gray); margin-top:2px; }
.route-card .count { margin-left:auto; font-size:24px; font-weight:700; color:var(--green); }
.route-card.cat-insumos .icon { background:#e8f5e9; }
.route-card.cat-envases .icon { background:#e3f2fd; }
.route-card.cat-mercado .icon { background:#fff3e0; }

/* Section list */
.section-list { padding:12px; padding-bottom:100px; max-width:500px; margin:0 auto; }
.progress-bar-wrap { background:var(--gray-border); border-radius:20px; height:8px; margin:8px 16px 16px; overflow:hidden; }
.progress-bar-fill { background:var(--green); height:100%; border-radius:20px; transition:width .3s; }
.progress-text { text-align:center; font-size:13px; color:var(--gray); margin-bottom:8px; }

/* Section card */
.section-card { background:var(--white); border-radius:var(--radius); margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden; }
.section-header { padding:14px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
.section-header .loc-icon { font-size:20px; }
.section-header .loc-name { font-size:15px; font-weight:600; flex:1; }
.section-header .loc-count { font-size:12px; color:var(--gray); background:var(--gray-bg); padding:2px 8px; border-radius:10px; }
.section-header .loc-check { font-size:18px; color:var(--green); display:none; }
.section-header .chevron { font-size:14px; color:var(--gray); transition:transform .2s; }
.section-card.done .section-header { background:var(--green-bg); }
.section-card.done .loc-check { display:block; }
.section-card.open .chevron { transform:rotate(180deg); }

/* Items */
.items-wrap { display:none; border-top:1px solid var(--gray-border); }
.section-card.open .items-wrap { display:block; }
.item-row { padding:10px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #f0f0f0; }
.item-row:last-child { border-bottom:none; }
.item-info { flex:1; min-width:0; }
.item-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-meta { font-size:11px; color:var(--gray); margin-top:1px; }
.item-meta .unit-badge { background:var(--blue-bg); color:var(--blue); padding:1px 5px; border-radius:4px; font-size:10px; }
.item-meta .variante-badge { background:#f3e5f5; color:#7b1fa2; padding:1px 5px; border-radius:4px; font-size:10px; }
.variante-input { margin-top:4px; }
.variante-input input { width:100%; padding:4px 8px; border:1px solid #e0e0e0; border-radius:6px; font-size:11px; background:#fafafa; }
.item-meta .tag-badge { background:#fff3e0; color:#e65100; padding:1px 5px; border-radius:4px; font-size:10px; }
.item-meta .season-badge { background:#e8f5e9; color:#2e7d32; padding:1px 5px; border-radius:4px; font-size:10px; }
/* ── Quick min/max editor (temp while calibrating) ── */
.max-tap  { background:var(--green-bg); color:var(--green); padding:1px 6px; border-radius:4px; font-size:10px; cursor:pointer; }
.no-max-tap { background:#fff3cd; color:#856404; padding:1px 6px; border-radius:4px; font-size:10px; cursor:pointer; }
.minmax-editor { display:none; background:#f0f7f4; border-top:1px solid #d8ead2; padding:8px 16px; }
.minmax-row { display:flex; align-items:center; gap:8px; }
.minmax-field { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; }
.minmax-field span { font-size:10px; font-weight:700; color:var(--gray); text-transform:uppercase; }
.minmax-field input { width:100%; padding:6px; border:1px solid var(--gray-border); border-radius:6px; font-size:14px; font-weight:600; text-align:center; -moz-appearance:textfield; }
.minmax-field input::-webkit-outer-spin-button, .minmax-field input::-webkit-inner-spin-button { -webkit-appearance:none; }
.minmax-save { background:var(--green); color:white; border:none; border-radius:6px; padding:10px 16px; font-size:16px; font-weight:700; cursor:pointer; flex-shrink:0; }

/* Stepper */
.stepper { display:flex; align-items:center; gap:0; flex-shrink:0; }
.stepper button { width:36px; height:36px; border:none; background:var(--gray-bg); color:var(--dark); font-size:20px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.stepper button:first-child { border-radius:8px 0 0 8px; }
.stepper button:last-child { border-radius:0 8px 8px 0; }
.stepper button:active { background:var(--gray-border); }
.stepper input { width:48px; height:36px; border:1px solid var(--gray-border); border-left:none; border-right:none; text-align:center; font-size:15px; font-weight:600; -moz-appearance:textfield; }
.stepper input::-webkit-outer-spin-button,
.stepper input::-webkit-inner-spin-button { -webkit-appearance:none; }

/* Section footer */
.section-footer { padding:10px 16px; background:var(--gray-bg); display:flex; gap:8px; }
.section-footer button { flex:1; padding:10px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
.btn-ok { background:var(--green); color:var(--white); }
.btn-ok:active { background:var(--green-light); }
.btn-reset { background:var(--white); color:var(--gray); border:1px solid var(--gray-border) !important; }

/* Summary bar */
.summary-bar { position:fixed; bottom:0; left:0; right:0; background:var(--white); padding:12px 16px; box-shadow:0 -2px 10px rgba(0,0,0,.1); display:none; z-index:90; }
.summary-bar .inner { max-width:500px; margin:0 auto; display:flex; gap:10px; align-items:center; }
.summary-bar .stats { flex:1; font-size:13px; }
.summary-bar .stats strong { color:var(--green); }
.btn-summary { background:var(--orange); color:var(--white); border:none; padding:12px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; }
.btn-summary:active { opacity:.9; }

/* Summary modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border-radius:16px 16px 0 0; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; padding:20px 16px 32px; }
.modal h2 { font-size:18px; margin-bottom:4px; }
.modal .modal-sub { font-size:13px; color:var(--gray); margin-bottom:16px; }
.modal .store-group { margin-bottom:16px; }
.modal .store-name { font-size:14px; font-weight:700; color:var(--green); padding:6px 0; border-bottom:2px solid var(--green-bg); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.modal .buy-item { font-size:13px; padding:5px 2px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #f5f5f5; }
.modal .buy-item .qty { font-weight:600; color:var(--orange); white-space:nowrap; margin-left:auto; }
.modal .buy-item.excluded { opacity:.35; text-decoration:line-through; }
.modal .buy-item.not-found { background:#fff8e1; border-radius:6px; padding:5px 6px; }
.modal .buy-item input[type=checkbox] { width:17px; height:17px; flex-shrink:0; cursor:pointer; accent-color:var(--green); }
.modal .item-label { flex:1; min-width:0; }
.modal .nf-badge { font-size:10px; background:#ffe0b2; color:#e65100; padding:1px 5px; border-radius:4px; margin-left:4px; white-space:nowrap; }
.modal .btn-nf { border:none; background:none; font-size:16px; cursor:pointer; padding:2px 4px; flex-shrink:0; opacity:.6; }
.modal .btn-nf.active { opacity:1; }
.modal .btn-completada { display:block; width:100%; padding:14px; background:var(--green); color:var(--white); border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:12px; }
.modal .close-btn { display:block; width:100%; padding:14px; background:var(--white); color:var(--gray); border:1px solid var(--gray-border); border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
.modal .copy-btn { display:block; width:100%; padding:14px; background:var(--white); color:var(--green); border:2px solid var(--green); border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }

/* Views */
.view { display:none; }
.view.active { display:block; }

/* Toast */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--dark); color:var(--white); padding:10px 20px; border-radius:20px; font-size:13px; z-index:300; display:none; white-space:nowrap; }
.toast.show { display:block; animation:fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }

/* Last updated */
.last-updated { text-align:center; padding:8px; font-size:11px; color:var(--gray); }

/* All done celebration */
.all-done { text-align:center; padding:40px 20px; }
.all-done .big-check { font-size:64px; margin-bottom:12px; }
.all-done h3 { font-size:18px; color:var(--green); }
.all-done p { font-size:13px; color:var(--gray); margin-top:4px; }

/* Pedir / Recibir route cards */
.route-card.cat-pedir .icon { background:#fff3e0; }
.route-card.cat-recibir .icon { background:#e8eaf6; }

/* Order cards */
.order-card { background:var(--white); border-radius:var(--radius); margin-bottom:10px; box-shadow:var(--shadow); padding:14px 16px; }
.order-card .supplier { font-size:15px; font-weight:600; }
.order-card .order-meta { font-size:12px; color:var(--gray); margin-top:2px; }
.order-card .order-items { font-size:13px; color:#555; margin-top:6px; line-height:1.5; }
.order-card .order-actions { display:flex; gap:8px; margin-top:10px; }
.order-card .order-actions button { flex:1; padding:10px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
.btn-receive { background:#3f51b5; color:var(--white); }
.btn-receive:active { opacity:.9; }
.btn-whatsapp { background:#25d366; color:var(--white); }
.btn-whatsapp:active { opacity:.9; }
.btn-ir { background:var(--orange); color:var(--white); }
.btn-ir:active { opacity:.9; }
.btn-pedido { background:#0077b6; color:var(--white); }
.btn-pedido:active { opacity:.9; }

/* Status badges */
.status-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.status-ordered { background:#e3f2fd; color:#1565c0; }
.status-received { background:#e8f5e9; color:#2e7d32; }
.status-pending { background:#fff3e0; color:#e65100; }

/* Modal actions fix */
.modal-actions { display:flex; gap:8px; }

/* Pedir V2: Filter bar */
.pedir-filters { padding:8px 12px; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; max-width:500px; margin:0 auto; }
.pedir-filters::-webkit-scrollbar { display:none; }
.pedir-chip { font-size:11px; padding:5px 12px; border:1px solid var(--gray-border); border-radius:16px; background:white; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all .15s; }
.pedir-chip.active { background:var(--green); color:white; border-color:var(--green); }
.pedir-chip.urgent { border-color:var(--red); color:var(--red); }
.pedir-chip.urgent.active { background:var(--red); color:white; }

/* Pedir V2: Fulfillment toggle */
.fulfill-toggle { display:inline-flex; border:1px solid var(--gray-border); border-radius:8px; overflow:hidden; font-size:11px; }
.fulfill-toggle button { padding:4px 10px; border:none; background:white; cursor:pointer; white-space:nowrap; transition:all .15s; }
.fulfill-toggle button.active { background:var(--green); color:white; font-weight:600; }

/* Pedir V2: Item checkboxes */
.pedir-item { display:flex; align-items:center; gap:6px; padding:4px 0; transition:opacity .15s; }
.pedir-item.excluded { opacity:.4; }
.pedir-item.excluded .item-text { text-decoration:line-through; }
.pedir-item input[type="checkbox"] { width:18px; height:18px; accent-color:var(--green); flex-shrink:0; cursor:pointer; }
.pedir-item .item-text { flex:1; font-size:13px; }
.pedir-item .item-qty { font-weight:600; color:var(--orange); font-size:13px; white-space:nowrap; }

/* Pedir V2: Select all toggle */
.select-all-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; margin-bottom:4px; border-bottom:1px dashed var(--gray-border); }
.select-all-row span { font-size:12px; color:var(--gray); }
.select-all-row button { font-size:11px; color:var(--blue); background:none; border:none; cursor:pointer; text-decoration:underline; }

/* Supplier site button */
.btn-site { background:var(--gray-bg); color:var(--dark); border:1px solid var(--gray-border) !important; }
.btn-site:active { background:var(--gray-border); }

/* ═══════════════════════════════════════
   RESPONSIVE — Tablet (768px+)
   ═══════════════════════════════════════ */
@media (min-width: 768px) {
  .header { padding:16px 24px; }
  .header h1 { font-size:24px; }

  /* Expand containers */
  .routes { max-width:700px; flex-direction:row; flex-wrap:wrap; }
  .route-card { flex:1 1 calc(33.33% - 8px); min-width:180px; }
  .section-list { max-width:700px; }
  .summary-bar .inner { max-width:700px; }
  .modal { max-width:600px; border-radius:16px; }
  .modal-overlay { align-items:center; }
  .pedir-filters { max-width:700px; }

  /* Stepper bigger touch targets */
  .stepper button { width:42px; height:42px; font-size:22px; }
  .stepper input { width:56px; height:42px; font-size:17px; }

  /* Section items - show more info */
  .item-name { font-size:15px; }
  .item-row { padding:12px 20px; gap:12px; }
  .section-header { padding:16px 20px; }

  /* Product management view wider */
  .products-container { max-width:700px !important; }
}

/* ═══════════════════════════════════════
   RESPONSIVE — Desktop (1024px+)
   ═══════════════════════════════════════ */
@media (min-width: 1024px) {
  .header { padding:18px 32px; }
  .header h1 { font-size:26px; }
  .back-btn { left:20px; font-size:28px; }

  /* Routes: 3-col grid on desktop */
  .routes { max-width:960px; gap:16px; }
  .route-card { flex:1 1 calc(33.33% - 12px); min-width:240px; padding:24px; }
  .route-card .icon { font-size:42px; width:64px; height:64px; }
  .route-card .info h3 { font-size:18px; }
  .route-card .count { font-size:28px; }

  /* Section list: 2-col layout for section cards */
  .section-list { max-width:960px; display:flex; flex-wrap:wrap; gap:12px; }
  .section-list > .section-card { flex:1 1 calc(50% - 6px); min-width:380px; margin-bottom:0; }
  .section-list > .all-done { flex:1 1 100%; }

  /* Summary bar wider */
  .summary-bar .inner { max-width:960px; }

  /* Modal centered and wider */
  .modal { max-width:700px; border-radius:16px; }

  /* Product management wider */
  .products-container { max-width:960px !important; }

  /* Pedir filters wider */
  .pedir-filters { max-width:960px; }

  /* Item rows: more comfortable spacing */
  .item-row { padding:14px 24px; }
  .item-name { font-size:16px; }
  .section-header .loc-name { font-size:17px; }
}

/* ═══════════════════════════════════════
   RESPONSIVE — Wide Desktop (1280px+)
   ═══════════════════════════════════════ */
@media (min-width: 1280px) {
  .routes { max-width:1100px; }
  .section-list { max-width:1100px; }
  .summary-bar .inner { max-width:1100px; }
  .products-container { max-width:1100px !important; }
  .pedir-filters { max-width:1100px; }

  /* Routes: keep 3 but more spacious */
  .route-card { padding:28px; }
  .route-card .icon { font-size:48px; width:72px; height:72px; }
}

/* ═══════════════════════════════════════
   MOBILE improvements (<480px)
   ═══════════════════════════════════════ */
@media (max-width: 480px) {
  .header { padding:12px; }
  .header h1 { font-size:18px; }
  .route-card { padding:14px; gap:12px; }
  .route-card .icon { font-size:28px; width:44px; height:44px; }
  .route-card .info h3 { font-size:14px; }
  .route-card .count { font-size:20px; }
  .stepper button { width:32px; height:32px; }
  .stepper input { width:42px; height:32px; font-size:14px; }
  .section-footer button { padding:8px; font-size:12px; }
}

/* ═══════════════════════════════════════════════════════════════
   TABLET / PHONE NUMPAD
═══════════════════════════════════════════════════════════════ */
#nb-numpad {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #f0ebe4; border-top: 2px solid #c4b8a8;
  border-radius: 22px 22px 0 0; box-shadow: 0 -8px 40px rgba(0,0,0,.22);
  padding: 16px 20px env(safe-area-inset-bottom, 24px);
  z-index: 99999; transform: translateY(100%);
  transition: transform .28s cubic-bezier(.34,1.3,.64,1);
  user-select: none; -webkit-user-select: none; touch-action: none;
}
#nb-numpad.np-open { transform: translateY(0); }
.np-display {
  background: white; border-radius: 14px; padding: 12px 18px;
  margin-bottom: 14px; display: flex; justify-content: space-between;
  align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.07); gap: 12px;
}
.np-label { font-size: 12px; font-weight: 700; color: #7a6b5d; text-transform: uppercase; letter-spacing: .6px; flex-shrink: 0; }
.np-value { font-size: 28px; font-weight: 900; color: #2d2319; text-align: right; min-width: 100px; letter-spacing: -.5px; }
.np-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 380px; margin: 0 auto; }
.np-btn {
  background: white; border: none; border-radius: 14px; font-size: 24px; font-weight: 700;
  color: #2d2319; padding: 18px 8px; cursor: pointer;
  box-shadow: 0 3px 8px rgba(0,0,0,.09); transition: transform .08s, background .08s;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.np-btn:active { transform: scale(.88); background: #e8f5e9; }
.np-btn.np-back { background: #fff0f0; color: #c62828; font-size: 20px; }
.np-btn.np-dot:disabled { opacity: .3; }
.np-btn.np-done {
  grid-column: 1 / -1; background: linear-gradient(135deg, #3a7c3a, #2e6b2e);
  color: white; font-size: 17px; letter-spacing: .5px;
  box-shadow: 0 5px 16px rgba(46,107,46,.35); padding: 16px 8px;
}
.np-btn.np-done:active { transform: scale(.97); }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
  <h1>NB Inventario</h1>
  <div class="subtitle" id="headerSub">Selecciona una categoría</div>
  <div id="nbUserBadge" style="position:absolute;top:12px;right:12px"></div>
</div>

<!-- View 1: Route Selection -->
<div class="view active" id="viewRoutes">
  <div class="routes" id="routeCards"></div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<!-- View 2: Section List -->
<div class="view" id="viewSections">
  <div class="progress-text" id="progressText"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="section-list" id="sectionList"></div>
</div>

<!-- Summary Bar -->
<div class="summary-bar" id="summaryBar">
  <div class="inner">
    <div class="stats" id="summaryStats"></div>
    <button class="btn-summary" onclick="showSummary()">📋 Lista de Compras</button>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="summaryModal">
  <div class="modal">
    <h2>🛒 Lista de Compras</h2>
    <div class="modal-sub" id="summaryDate"></div>
    <div id="summaryContent"></div>
    <button class="btn-completada" id="btnCompletada" onclick="completarCompra()">✅ Compra completada</button>
    <button class="copy-btn" onclick="copySummary()">📋 Copiar lista</button>
    <button class="close-btn" onclick="closeSummary()">Cerrar</button>
  </div>
</div>

<!-- View 3: Pedir (Ordering) -->
<div class="view" id="viewPedir">

<script>
// ============ PRODUCT DATA (legacy — used for seeding) ============
</script>
<script id="productData">
</script>
<script>
// Will be populated by buildProductData() or inline

// ============ STATE ============
const STORAGE_KEY = 'nb_inventario_counts';
const STORAGE_TS = 'nb_inventario_ts';
const STORAGE_DONE = 'nb_inventario_done_sections';

let currentCategory = null;
let counts = {};      // { productIndex: count }
let variantNotes = {}; // { productIndex: "variant text" }
let doneSections = {}; // { "category|location": true }

// ============ LOCATION ICONS ============
const LOC_ICONS = {
  'Cocina': '🍳',
  'Almacén': '📦',
  'Cuarto Frio Materia Prima': '🧊',
  'Cuarto Frio Ventas': '🧊',
  'Congelador (Himalaya)': '❄️',
  'Congelador (ataúd)': '❄️',
  'Producción': '🏭',
  'Tienda': '🏪',
  'Comedor': '🍽️',
  'Oficina': '🗂️',
  'Proveedores': '🚚',
  'Granja': '🌾',
  'Casa 1': '🏠',
  'Sin ubicación': '📍'
};
const CAT_ICONS = {
  'Insumos / Clubs': '🛒',
  'Envases y Limpieza': '📦',
  'Mercado Abastos + Carnes': '🥩'
};
const CAT_DESCRIPTIONS = {
  'Insumos / Clubs': 'Abarrotes, especias, clubs',
  'Envases y Limpieza': 'Empaques, bolsas, limpieza',
  'Mercado Abastos + Carnes': 'Verduras, carnes, congelados'
};

// ============ INIT ============
function init() {
  loadState();
  renderRoutes();
  updateLastUpdated();
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) counts = JSON.parse(saved);
    const savedDone = localStorage.getItem(STORAGE_DONE);
    if (savedDone) doneSections = JSON.parse(savedDone);
    const savedVars = localStorage.getItem('nb_inventario_variants');
    if (savedVars) variantNotes = JSON.parse(savedVars);
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
  localStorage.setItem(STORAGE_DONE, JSON.stringify(doneSections));
  localStorage.setItem('nb_inventario_variants', JSON.stringify(variantNotes));
  localStorage.setItem(STORAGE_TS, new Date().toISOString());
}

function setVariant(idx, val) {
  variantNotes[idx] = val.trim();
  saveState();
}

// ── Quick Min/Max editor (inline during counting) ──
function toggleMinMax(idx) {
  const editor = document.getElementById('mme-' + idx);
  if (!editor) return;
  const isOpen = editor.style.display === 'flex';
  // Close any other open editors first
  document.querySelectorAll('.minmax-editor').forEach(el => { el.style.display = 'none'; });
  if (!isOpen) {
    editor.style.display = 'flex';
    const maxInput = document.getElementById('mmax-' + idx);
    if (maxInput) { maxInput.select(); maxInput.focus(); }
  }
}

function saveMinMax(idx) {
  const newMin = parseFloat(document.getElementById('mmin-' + idx).value) || 0;
  const newMax = parseFloat(document.getElementById('mmax-' + idx).value) || 0;

  PRODUCTS[idx].inv = newMin;
  PRODUCTS[idx].max = newMax;
  saveProductsToCache();

  // Close editor
  const editor = document.getElementById('mme-' + idx);
  if (editor) editor.style.display = 'none';

  // Update the badge inline (no full re-render needed)
  const badge = document.getElementById('maxbadge-' + idx);
  if (badge) {
    if (newMax > 0) {
      badge.className = 'max-tap';
      badge.textContent = 'Máx: ' + newMax + ' ✏️';
    } else {
      badge.className = 'no-max-tap';
      badge.textContent = '⚙️ Fijar máx';
    }
  }

  updateSummaryStats();
  toast('✅ Mín: ' + newMin + '  Máx: ' + newMax);

  // Push to Sheet
  const p = PRODUCTS[idx];
  if (p.id) {
    const url = getScriptUrl();
    if (url) {
      fetch(url, { method: 'POST', headers: {'Content-Type':'text/plain'},
        body: JSON.stringify({ action: 'update_product', id: p.id,
          fields: { Inventario_Min: newMin, Inventario_Max: newMax }
        })
      }).then(r => r.json())
        .then(d => { if (d.ok) console.log('✅ Min/Max synced to Sheet:', p.id); })
        .catch(e => console.log('MinMax sync error:', e));
    }
  }
}

// ============ ROUTES VIEW ============
function renderRoutes() {
  const activeProducts = getActiveProducts();
  const cats = {};
  activeProducts.forEach((p, i) => {
    if (!cats[p.c]) cats[p.c] = { count: 0, locations: new Set() };
    cats[p.c].count++;
    cats[p.c].locations.add(p.l);
  });

  const order = ['Insumos / Clubs', 'Envases y Limpieza', 'Mercado Abastos + Carnes'];
  const classes = ['cat-insumos', 'cat-envases', 'cat-mercado'];

  let html = '';
  order.forEach((cat, idx) => {
    if (!cats[cat]) return;
    const info = cats[cat];
    const doneCount = countDoneSections(cat);
    const totalSections = info.locations.size;
    html += `
      <div class="route-card ${classes[idx]}" onclick="selectCategory('${cat.replace(/'/g,"\\'")}')">
        <div class="icon">${CAT_ICONS[cat] || '📋'}</div>
        <div class="info">
          <h3>${cat}</h3>
          <p>${CAT_DESCRIPTIONS[cat] || ''} · ${info.locations.size} secciones</p>
          ${doneCount > 0 ? `<p style="color:var(--green);font-weight:600">${doneCount}/${totalSections} listas ✓</p>` : ''}
        </div>
        <div class="count">${info.count}</div>
      </div>`;
  });
  // Add Pedir and Recibir cards
  const pendingOrders = orders.filter(o => o.status === 'ordered').length;
  html += `
    <div style="border-top:2px solid var(--gray-border);margin:8px 0;padding-top:4px;width:100%;flex-basis:100%"></div>
    <div class="route-card cat-pedir" onclick="showPedir()">
      <div class="icon">🛒</div>
      <div class="info">
        <h3>Pedir</h3>
        <p>Ordenar productos faltantes</p>
      </div>
      <div class="count" style="font-size:16px">📋</div>
    </div>
    <div class="route-card" onclick="showProducts()" style="border:1px dashed var(--gray-border)">
      <div class="icon" style="background:#fce4ec">⚙️</div>
      <div class="info">
        <h3>Productos</h3>
        <p>Agregar, editar, activar/desactivar</p>
      </div>
      <div class="count" style="font-size:14px;color:var(--gray)">${PRODUCTS.filter(p=>p.active!==false).length}</div>
    </div>
    <div class="route-card cat-recibir" onclick="showRecibir()">
      <div class="icon">📦</div>
      <div class="info">
        <h3>Recibir</h3>
        <p>Confirmar entregas de proveedores</p>
        ${pendingOrders > 0 ? `<p style="color:#1565c0;font-weight:600">${pendingOrders} pedido${pendingOrders>1?'s':''} por recibir</p>` : ''}
      </div>
      <div class="count" style="font-size:16px">${pendingOrders > 0 ? pendingOrders : '—'}</div>
    </div>`;

  document.getElementById('routeCards').innerHTML = html;
}

function countDoneSections(cat) {
  return Object.keys(doneSections).filter(k => k.startsWith(cat + '|')).length;
}

// ============ SECTIONS VIEW ============
function selectCategory(cat) {
  currentCategory = cat;
  showView('viewSections');
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerSub').textContent = cat;
  document.getElementById('summaryBar').style.display = 'block';
  renderSections();
}

function renderSections() {
  // Group active, in-season products by location
  const locMap = {};
  PRODUCTS.forEach((p, i) => {
    if (p.c !== currentCategory) return;
    if (p.active === false) return;
    if (!isProductInSeason(p)) return;
    if (!locMap[p.l]) locMap[p.l] = [];
    locMap[p.l].push({ ...p, idx: i });
  });

  // Sort locations: done sections at bottom
  const locKeys = Object.keys(locMap).sort((a, b) => {
    const aDone = doneSections[currentCategory + '|' + a] ? 1 : 0;
    const bDone = doneSections[currentCategory + '|' + b] ? 1 : 0;
    if (aDone !== bDone) return aDone - bDone;
    return b.length - a.length; // bigger sections first
  });

  const totalSections = locKeys.length;
  const doneCount = locKeys.filter(l => doneSections[currentCategory + '|' + l]).length;

  document.getElementById('progressText').textContent = `${doneCount} de ${totalSections} secciones completadas`;
  document.getElementById('progressFill').style.width = (totalSections > 0 ? (doneCount/totalSections*100) : 0) + '%';

  let html = '';

  if (doneCount === totalSections && totalSections > 0) {
    html += `<div class="all-done">
      <div class="big-check">✅</div>
      <h3>¡${currentCategory} completo!</h3>
      <p>Todas las secciones han sido contadas</p>
    </div>`;
  }

  locKeys.forEach(loc => {
    const items = locMap[loc].sort((a, b) => a.n.localeCompare(b.n, 'es'));
    const sectionKey = currentCategory + '|' + loc;
    const isDone = doneSections[sectionKey];
    const icon = LOC_ICONS[loc] || LOC_ICONS[loc.split(',')[0].trim()] || '📍';

    html += `
      <div class="section-card ${isDone ? 'done' : ''}" id="sec-${encodeKey(sectionKey)}">
        <div class="section-header" onclick="toggleSection('${encodeKey(sectionKey)}')">
          <span class="loc-icon">${icon}</span>
          <span class="loc-name">${loc}</span>
          <span class="loc-check">✓</span>
          <span class="loc-count">${items.length}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="items-wrap">`;

    items.forEach(item => {
      const count = counts[item.idx] !== undefined ? counts[item.idx] : item.inv;
      const maxBadge = item.max > 0
        ? `<span id="maxbadge-${item.idx}" class="max-tap" onclick="toggleMinMax(${item.idx})">Máx: ${item.max} ✏️</span>`
        : `<span id="maxbadge-${item.idx}" class="no-max-tap" onclick="toggleMinMax(${item.idx})">⚙️ Fijar máx</span>`;
      html += `
          <div class="item-row">
            <div class="item-info">
              <div class="item-name">${item.n}</div>
              <div class="item-meta">
                ${item.s ? '<span>'+item.s+'</span>' : ''}
                ${item.u ? ' <span class="unit-badge">'+item.u+'</span>' : ''}
                 ${maxBadge}
                ${item.variantes ? ' <span class="variante-badge">📎 variantes</span>' : ''}
                ${item.tags ? ' '+item.tags.split(',').map(t=>'<span class="tag-badge">'+t.trim()+'</span>').join(' ') : ''}
              </div>
            </div>
            <div class="stepper">
              <button onclick="adj(${item.idx},-1)">−</button>
              <input type="number" id="cnt-${item.idx}" value="${count}"
                     onchange="setCount(${item.idx},this.value)"
                     inputmode="decimal" step="0.5" min="0">
              <button onclick="adj(${item.idx},1)">+</button>
            </div>
          </div>
          <div class="minmax-editor" id="mme-${item.idx}">
            <div class="minmax-row">
              <div class="minmax-field"><span>Mín</span><input type="number" id="mmin-${item.idx}" value="${item.inv||0}" step="0.5" min="0" inputmode="decimal"></div>
              <div class="minmax-field"><span>Máx</span><input type="number" id="mmax-${item.idx}" value="${item.max||0}" step="0.5" min="0" inputmode="decimal"></div>
              <button class="minmax-save" onclick="saveMinMax(${item.idx})">✓</button>
            </div>
          </div>
          ${item.variantes ? '<div class="variante-input" style="padding:0 16px 6px"><input type="text" id="var-'+item.idx+'" placeholder="'+item.variantes+'" value="'+(variantNotes[item.idx]||'')+'" onchange="setVariant('+item.idx+',this.value)"></div>' : ''}`;
    });

    html += `
          <div class="section-footer">
            <button class="btn-reset" onclick="resetSection('${encodeKey(sectionKey)}')">↺ Reset</button>
            <button class="btn-ok" onclick="markDone('${encodeKey(sectionKey)}')">
              ${isDone ? '✓ Completada' : '✓ Sección lista'}
            </button>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('sectionList').innerHTML = html;
  updateSummaryStats();
}

function encodeKey(k) { return btoa(unescape(encodeURIComponent(k))).replace(/=/g,''); }
function decodeKey(k) {
  // Add back padding
  while (k.length % 4) k += '=';
  return decodeURIComponent(escape(atob(k)));
}

function toggleSection(encodedKey) {
  const el = document.getElementById('sec-' + encodedKey);
  if (el) el.classList.toggle('open');
}

// ============ COUNTING ============
function adj(idx, delta) {
  const input = document.getElementById('cnt-' + idx);
  let val = parseFloat(input.value) || 0;
  val = Math.max(0, val + delta);
  // Round to nearest 0.5
  val = Math.round(val * 2) / 2;
  input.value = val;
  counts[idx] = val;
  saveState();
}

function setCount(idx, val) {
  const num = parseFloat(val) || 0;
  counts[idx] = Math.max(0, num);
  document.getElementById('cnt-' + idx).value = counts[idx];
  saveState();
}

function markDone(encodedKey) {
  const key = decodeKey(encodedKey);
  doneSections[key] = true;
  saveState();
  renderSections();
  toast('✓ Sección completada');
  // Push inventory counts for this section to Sheet
  pushSectionCountsToSheet(key);
}

function pushSectionCountsToSheet(sectionKey) {
  const url = getScriptUrl();
  if (!url) return;
  const [cat, loc] = [sectionKey.split('|')[0], sectionKey.split('|').slice(1).join('|')];
  const items = [];
  PRODUCTS.forEach((p, i) => {
    if (p.c === cat && p.l === loc && p.active !== false) {
      const qty = counts[i] !== undefined ? counts[i] : p.inv;
      const vNote = variantNotes[i] || '';
      items.push({ producto: p.n, cantidad: qty, seccion: loc, categoria: cat, variante: vNote });
    }
  });
  if (items.length === 0) return;
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'log_inventory', items, quien: 'App', device: navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop' })
  }).then(r => r.json()).then(d => {
    if (d.ok) console.log('📊 ' + items.length + ' counts logged to Sheet');
  }).catch(e => console.log('Count push error:', e));
}

function resetSection(encodedKey) {
  const key = decodeKey(encodedKey);
  const [cat, loc] = [key.split('|')[0], key.split('|').slice(1).join('|')];

  // Reset counts and variant notes for items in this section
  PRODUCTS.forEach((p, i) => {
    if (p.c === cat && p.l === loc) {
      delete counts[i];
      delete variantNotes[i];
      const input = document.getElementById('cnt-' + i);
      if (input) input.value = p.inv;
      const varInput = document.getElementById('var-' + i);
      if (varInput) varInput.value = '';
    }
  });

  delete doneSections[key];
  saveState();
  renderSections();
  toast('↺ Sección reiniciada');
}

// ============ SUMMARY ============
function updateSummaryStats() {
  // Count items where count < max (needs buying)
  let needBuy = 0;
  let totalItems = 0;
  PRODUCTS.forEach((p, i) => {
    if (p.c !== currentCategory) return;
    totalItems++;
    const current = counts[i] !== undefined ? counts[i] : p.inv;
    if (p.max > 0 && current < p.max) needBuy++;
  });

  const statsEl = document.getElementById('summaryStats');
  if (needBuy > 0) {
    statsEl.innerHTML = `<strong>${needBuy}</strong> productos por comprar`;
  } else {
    statsEl.innerHTML = `<strong>${totalItems}</strong> productos contados`;
  }
}

// ── Shopping list state ──
let shoppingItems = []; // [{ idx, name, qty, unit, store }] — rebuilt each time modal opens
let shoppingExclusions = {}; // { idx: true } — persisted: user decided not to buy this
let shoppingNotFound = {};   // { idx: true } — session only: couldn't find it at the store
const SHOPPING_EXCL_KEY = 'nb_shopping_exclusions';
try { shoppingExclusions = JSON.parse(localStorage.getItem(SHOPPING_EXCL_KEY) || '{}'); } catch(e) {}

function buildShoppingItems() {
  shoppingItems = [];
  PRODUCTS.forEach((p, i) => {
    if (currentCategory && p.c !== currentCategory) return;
    const current = counts[i] !== undefined ? counts[i] : p.inv;
    const need = p.max > 0 ? Math.max(0, p.max - current) : 0;
    if (need > 0) {
      shoppingItems.push({ idx: i, name: p.n, qty: need, unit: p.u, store: p.s || 'Sin tienda' });
    }
  });
}

function renderSummaryContent() {
  const storeMap = {};
  shoppingItems.forEach(item => {
    if (!storeMap[item.store]) storeMap[item.store] = [];
    storeMap[item.store].push(item);
  });
  const storeKeys = Object.keys(storeMap).sort();

  let html = '';
  if (storeKeys.length === 0) {
    html = '<p style="text-align:center;color:var(--gray);padding:20px">No hay productos por comprar con máximos definidos.<br><br>💡 Define máximos en tu lista para generar pedidos automáticos.</p>';
  } else {
    // Count stats for header
    const totalItems = shoppingItems.length;
    const excludedCount = shoppingItems.filter(it => shoppingExclusions[it.idx]).length;
    const notFoundCount = shoppingItems.filter(it => shoppingNotFound[it.idx] && !shoppingExclusions[it.idx]).length;
    const toBuyCount = totalItems - excludedCount;
    html += `<p style="font-size:12px;color:var(--gray);margin-bottom:12px">${toBuyCount} productos · ${excludedCount > 0 ? excludedCount+' omitidos · ' : ''}${notFoundCount > 0 ? notFoundCount+' no encontrados · ' : ''}Toca ☑️ para omitir · 🔍 si no encontraste</p>`;

    storeKeys.forEach(store => {
      const items = storeMap[store];
      const activeCount = items.filter(it => !shoppingExclusions[it.idx]).length;
      html += `<div class="store-group">
        <div class="store-name">🏪 ${store} <span style="font-weight:400;font-size:12px;color:var(--gray)">(${activeCount} de ${items.length})</span></div>`;
      items.forEach(item => {
        const excl = !!shoppingExclusions[item.idx];
        const nf   = !!shoppingNotFound[item.idx];
        const nfBadge = nf ? `<span class="nf-badge">🔍 No encontré</span>` : '';
        html += `<div class="buy-item ${excl ? 'excluded' : ''} ${nf ? 'not-found' : ''}">
          <input type="checkbox" ${excl ? '' : 'checked'} onchange="toggleShoppingExclusion(${item.idx})">
          <span class="item-label">${item.name}${nfBadge}</span>
          <span class="qty">${item.qty}${item.unit ? `<span style="font-size:10px;background:#e3f2fd;color:#1565c0;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600">${item.unit}</span>` : ''}</span>
          <button class="btn-nf ${nf ? 'active' : ''}" title="${nf ? 'Quitar' : 'No encontré este producto'}" onclick="toggleNotFound(${item.idx})">${nf ? '🔄' : '🔍'}</button>
        </div>`;
      });
      html += '</div>';
    });
  }

  document.getElementById('summaryContent').innerHTML = html;

  // Show "Completar" only when there's something to complete (included & found)
  const hasActionable = shoppingItems.some(it => !shoppingExclusions[it.idx] && !shoppingNotFound[it.idx]);
  document.getElementById('btnCompletada').style.display = hasActionable ? 'block' : 'none';
}

function showSummary() {
  buildShoppingItems();
  const now = new Date();
  document.getElementById('summaryDate').textContent =
    now.toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  renderSummaryContent();
  document.getElementById('summaryModal').classList.add('open');
}

function closeSummary() {
  document.getElementById('summaryModal').classList.remove('open');
}

function toggleShoppingExclusion(idx) {
  if (shoppingExclusions[idx]) {
    delete shoppingExclusions[idx];
  } else {
    shoppingExclusions[idx] = true;
    delete shoppingNotFound[idx]; // can't mark "not found" if excluded
  }
  localStorage.setItem(SHOPPING_EXCL_KEY, JSON.stringify(shoppingExclusions));
  renderSummaryContent();
}

function toggleNotFound(idx) {
  if (shoppingNotFound[idx]) {
    delete shoppingNotFound[idx];
  } else {
    shoppingNotFound[idx] = true;
    delete shoppingExclusions[idx]; // re-include if was excluded — we still want it
    localStorage.setItem(SHOPPING_EXCL_KEY, JSON.stringify(shoppingExclusions));
  }
  renderSummaryContent();
}

function completarCompra() {
  // Set counts to max for all items that are included and were found
  let updated = 0;
  shoppingItems.forEach(item => {
    if (shoppingExclusions[item.idx] || shoppingNotFound[item.idx]) return;
    counts[item.idx] = PRODUCTS[item.idx].max;
    updated++;
  });
  if (updated > 0) {
    saveState();
    updateSummaryStats();
  }
  shoppingNotFound = {}; // reset "not found" flags for next trip
  closeSummary();
  buildShoppingItems(); // rebuild so summary bar count updates
  toast(`✅ ${updated} productos marcados como comprados`);
  if (updated > 0) renderRoutes();
}

function copySummary() {
  let text = `🛒 Lista de Compras NB\n📅 ${new Date().toLocaleDateString('es-MX')}\n`;
  if (currentCategory) text += `📦 ${currentCategory}\n`;
  text += '\n';

  // Group: only items that are included (not excluded) — not-found items ARE included (still need them)
  const storeMap = {};
  shoppingItems.forEach(item => {
    if (shoppingExclusions[item.idx]) return;
    if (!storeMap[item.store]) storeMap[item.store] = [];
    const nf = shoppingNotFound[item.idx] ? ' 🔍' : '';
    storeMap[item.store].push({ name: item.name + nf, qty: item.qty, unit: item.unit });
  });

  Object.keys(storeMap).sort().forEach(store => {
    text += `\n🏪 ${store}\n`;
    storeMap[store].forEach(item => {
      text += `  • ${item.name}: ${item.qty}${item.unit ? ' '+item.unit : ''}\n`;
    });
  });

  navigator.clipboard.writeText(text).then(() => toast('📋 Lista copiada')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('📋 Lista copiada');
  });
}

// ============ NAVIGATION ============
function goBack() {
  currentCategory = null;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('viewRoutes').classList.add('active');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerSub').textContent = 'Selecciona una categoría';
  document.getElementById('summaryBar').style.display = 'none';
  renderRoutes(); // Refresh done counts + order counts
}

// ============ UTILS ============
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function updateLastUpdated() {
  const ts = localStorage.getItem(STORAGE_TS);
  if (ts) {
    const d = new Date(ts);
    document.getElementById('lastUpdated').textContent =
      'Último conteo: ' + d.toLocaleDateString('es-MX') + ' ' + d.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  }
}

// ============ CLEAR ALL ============
function clearAll() {
  if (confirm('¿Borrar todos los conteos y empezar de nuevo?')) {
    counts = {};
    doneSections = {};
    saveState();
    if (currentCategory) renderSections();
    else renderRoutes();
    toast('🗑️ Conteos borrados');
  }
}
