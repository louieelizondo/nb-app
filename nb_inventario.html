// ============ ORDERS / RECEIVING STATE ============
const ORDERS_KEY = 'nb_inventario_orders';
const RECEIVERS_KEY = 'nb_inventario_receivers';

let orders = []; // { id, supplier, items:[{name,qty,unit}], mode, status:'ordered'|'received', ordered_at, received_at, receiver, notes, foto }
let receivers = ['Luis', 'Diana', 'Carlos', 'Ana']; // Default authorized receivers, editable

function loadOrders() {
  try {
    const saved = localStorage.getItem(ORDERS_KEY);
    if (saved) orders = JSON.parse(saved);
    const savedRec = localStorage.getItem(RECEIVERS_KEY);
    if (savedRec) receivers = JSON.parse(savedRec);
  } catch(e) {}
}
function saveOrders() {
  localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
  localStorage.setItem(RECEIVERS_KEY, JSON.stringify(receivers));
}

// ============ PEDIR (ORDERING) VIEW V2 ============
const SUPPLIER_URLS = {
  "SAM'S CLUB": "https://www.sams.com.mx",
  "COSTCO": "https://www.costco.com.mx",
  "WALMART": "https://www.walmart.com.mx",
  "MERCADOLIBRE": "https://www.mercadolibre.com.mx",
  "CITY CLUB": "https://www.cityclub.com.mx",
  "SORIANA": "https://www.soriana.com",
  "ALSUPER": "https://www.alsuper.com"
};

let pedirFilter = 'all'; // all, urgent, category name
let pedirExcluded = {}; // { productIdx: true } — in-memory, resets each time
let pedirModeOverrides = {}; // { supplier: 'Ir a tienda' | 'Pedido domicilio' }

// Load mode overrides from localStorage
try { pedirModeOverrides = JSON.parse(localStorage.getItem('nb_pedir_modes') || '{}'); } catch(e) {}

function savePedirModes() {
  localStorage.setItem('nb_pedir_modes', JSON.stringify(pedirModeOverrides));
}

function showPedir() {
  pedirExcluded = {}; // Reset exclusions on each open
  showView('viewPedir');
  document.getElementById('headerSub').textContent = 'Ordenar productos';
  document.getElementById('backBtn').style.display = 'block';
  renderPedirFilters();
  renderPedir();
}

function renderPedirFilters() {
  const chips = [
    { id: 'all', label: 'Todos', cls: '' },
    { id: 'urgent', label: '🔴 Urgentes (0)', cls: 'urgent' },
    { id: 'Insumos / Clubs', label: '🛒 Insumos', cls: '' },
    { id: 'Envases y Limpieza', label: '📦 Envases', cls: '' },
    { id: 'Mercado Abastos + Carnes', label: '🥩 Mercado', cls: '' }
  ];
  document.getElementById('pedirFilters').innerHTML = chips.map(c =>
    `<button class="pedir-chip ${c.cls} ${pedirFilter === c.id ? 'active' : ''}" onclick="setPedirFilter('${c.id}',this)">${c.label}</button>`
  ).join('');
}

function setPedirFilter(filter, btn) {
  pedirFilter = filter;
  document.querySelectorAll('.pedir-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderPedir();
}

function getNeedsOrder() {
  const needsOrder = [];
  // Include ALL active products (even out-of-season) for pre-ordering
  const allActive = PRODUCTS.filter(p => p.active !== false);
  allActive.forEach(p => {
    const origIdx = PRODUCTS.indexOf(p);
    // Only consider products that have been counted (exist in counts{})
    if (counts[origIdx] === undefined) return;
    const current = counts[origIdx];
    const needed = (p.max > 0 && current < p.max) ? p.max - current : (current < p.inv ? p.inv - current : 0);
    if (needed > 0) {
      const inSeason = isProductInSeason(p);
      needsOrder.push({ ...p, idx: origIdx, current, needed: Math.round(needed * 10) / 10, isUrgent: current === 0, outOfSeason: !inSeason });
    }
  });
  return needsOrder;
}

function renderPedir() {
  let needsOrder = getNeedsOrder();

  // Apply filter
  if (pedirFilter === 'urgent') {
    needsOrder = needsOrder.filter(p => p.isUrgent);
  } else if (pedirFilter !== 'all') {
    needsOrder = needsOrder.filter(p => p.c === pedirFilter);
  }

  if (needsOrder.length === 0) {
    document.getElementById('pedirList').innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:var(--gray)">
        <div style="font-size:48px;margin-bottom:12px">${pedirFilter === 'all' ? '✅' : '🔍'}</div>
        <h3 style="color:var(--green)">${pedirFilter === 'all' ? 'Todo surtido' : 'Sin resultados'}</h3>
        <p>${pedirFilter === 'all' ? 'No hay productos pendientes de ordenar' : 'No hay productos en este filtro'}</p>
      </div>`;
    return;
  }

  // Group by supplier
  const bySupplier = {};
  needsOrder.forEach(p => {
    const s = p.s || 'Sin tienda';
    if (!bySupplier[s]) bySupplier[s] = [];
    bySupplier[s].push(p);
  });

  // Count selected
  const totalSelected = needsOrder.filter(p => !pedirExcluded[p.idx]).length;
  let html = `<div style="padding:8px 4px;font-size:13px;color:var(--gray);text-align:center">${totalSelected} de ${needsOrder.length} seleccionados · ${Object.keys(bySupplier).length} proveedores</div>`;

  Object.keys(bySupplier).sort().forEach(supplier => {
    const items = bySupplier[supplier];
    const selectedItems = items.filter(p => !pedirExcluded[p.idx]);
    const existingOrder = orders.find(o => o.supplier === supplier && o.status === 'ordered');
    const orderBadge = existingOrder ? '<span class="status-badge status-ordered">📦 Ordenado</span>' : '';

    // Determine fulfillment mode (override or auto-detect from items)
    let currentMode = pedirModeOverrides[supplier];
    if (!currentMode) {
      const modes = {};
      items.forEach(p => { modes[p.f || 'Ir a tienda'] = (modes[p.f || 'Ir a tienda'] || 0) + 1; });
      currentMode = Object.keys(modes).sort((a,b) => modes[b] - modes[a])[0];
    }
    const isDelivery = currentMode === 'Pedido domicilio';
    const supplierEsc = supplier.replace(/'/g, "\\'");

    // Fulfillment toggle
    const fulfillToggle = `
      <div class="fulfill-toggle">
        <button class="${!isDelivery ? 'active' : ''}" onclick="setPedirMode('${supplierEsc}','Ir a tienda')">🏪 Recoger</button>
        <button class="${isDelivery ? 'active' : ''}" onclick="setPedirMode('${supplierEsc}','Pedido domicilio')">📦 Domicilio</button>
      </div>`;

    // Select all / none toggle
    const allSelected = items.every(p => !pedirExcluded[p.idx]);
    const selectAllRow = `
      <div class="select-all-row">
        <span>${selectedItems.length} de ${items.length} seleccionados</span>
        <button onclick="toggleAllSupplier('${supplierEsc}', ${allSelected ? 'false' : 'true'})">${allSelected ? 'Quitar todos' : 'Seleccionar todos'}</button>
      </div>`;

    // Item list with checkboxes
    const itemList = items.map(p => {
      const excluded = pedirExcluded[p.idx];
      return `
        <div class="pedir-item ${excluded ? 'excluded' : ''}">
          <input type="checkbox" ${excluded ? '' : 'checked'} onchange="togglePedirItem(${p.idx})">
          <span class="item-text">${p.n}${p.isUrgent ? ' <span style="color:var(--red);font-size:10px">● agotado</span>' : ''}${p.outOfSeason ? ' <span style="color:#ff9800;font-size:10px;background:#fff3e0;padding:1px 5px;border-radius:8px">⏳ fuera de temp.</span>' : ''}</span>
          <span class="item-qty">${p.needed} ${p.u||''}</span>
        </div>`;
    }).join('');

    // Action buttons
    let actions = '';
    const siteUrl = SUPPLIER_URLS[supplier];

    if (existingOrder) {
      actions += `<button class="btn-receive" onclick="markOrderReceiving('${supplierEsc}')">📦 Recibir</button>`;
    } else if (isDelivery) {
      actions += `<button class="btn-pedido" onclick="placeOrder('${supplierEsc}')">📦 Ordenado</button>`;
    } else {
      actions += `<button class="btn-ir" onclick="copySupplierList('${supplierEsc}')">📋 Copiar</button>`;
    }

    if (siteUrl) {
      actions += ` <button class="btn-site" onclick="window.open('${siteUrl}','_blank')">🌐 Sitio</button>`;
    }

    // WhatsApp — only for selected items
    const waItems = selectedItems.map(p => `• ${p.n}: ${p.needed} ${p.u||'unid'}`).join('\n');
    const waMsg = encodeURIComponent(`Hola, pedido de Natural Balance:\n\n${waItems}\n\nGracias!`);
    actions += ` <button class="btn-whatsapp" onclick="window.open('https://wa.me/?text=${waMsg}','_blank')">💬 WA</button>`;

    html += `
      <div class="order-card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
          <div class="supplier">${supplier}</div>
          <div style="display:flex;gap:6px;align-items:center">${orderBadge} ${fulfillToggle}</div>
        </div>
        <div class="order-meta" style="margin-top:4px">${items.length} productos · ${currentMode}</div>
        <div class="order-items" style="margin:8px 0">
          ${selectAllRow}
          ${itemList}
        </div>
        <div class="order-actions">${actions}</div>
      </div>`;
  });

  document.getElementById('pedirList').innerHTML = html;
}

function togglePedirItem(idx) {
  if (pedirExcluded[idx]) {
    delete pedirExcluded[idx];
  } else {
    pedirExcluded[idx] = true;
  }
  renderPedir();
}

function toggleAllSupplier(supplier, selectAll) {
  const items = getNeedsOrder().filter(p => (p.s || 'Sin tienda') === supplier);
  items.forEach(p => {
    if (selectAll) {
      delete pedirExcluded[p.idx];
    } else {
      pedirExcluded[p.idx] = true;
    }
  });
  renderPedir();
}

function setPedirMode(supplier, mode) {
  pedirModeOverrides[supplier] = mode;
  savePedirModes();
  renderPedir();
}

function placeOrder(supplier) {
  const selected = getNeedsOrder().filter(p => (p.s || 'Sin tienda') === supplier && !pedirExcluded[p.idx]);
  if (selected.length === 0) { toast('Selecciona al menos un producto'); return; }

  const newOrder = {
    id: 'ORD' + Date.now(),
    supplier,
    items: selected.map(p => ({ name: p.n, qty: p.needed, unit: p.u || '' })),
    mode: pedirModeOverrides[supplier] || 'Pedido domicilio',
    status: 'ordered',
    ordered_at: new Date().toISOString()
  };
  orders.push(newOrder);
  saveOrders();
  renderPedir();
  toast(`📦 Pedido a ${supplier} registrado`);
  // Sync order to Sheet
  pushOrderToSheet(newOrder);
}

function copySupplierList(supplier) {
  const selected = getNeedsOrder().filter(p => (p.s || 'Sin tienda') === supplier && !pedirExcluded[p.idx]);
  if (selected.length === 0) { toast('Selecciona al menos un producto'); return; }
  const text = `${supplier}\n${selected.map(p => `• ${p.n}: ${p.needed} ${p.u || 'unid'}`).join('\n')}`;
  navigator.clipboard.writeText(text).then(() => toast('📋 Lista copiada'));
}

// ============ RECIBIR (RECEIVING) VIEW ============
let receivingOrderId = null;

function showRecibir() {
  showView('viewRecibir');
  document.getElementById('headerSub').textContent = 'Recibir pedidos';
  document.getElementById('backBtn').style.display = 'block';
  renderRecibir();
}

function renderRecibir() {
  const pending = orders.filter(o => o.status === 'ordered');
  const recent = orders.filter(o => o.status === 'received').sort((a,b) => (b.received_at||'').localeCompare(a.received_at||'')).slice(0, 5);

  let html = '';

  if (pending.length === 0 && recent.length === 0) {
    html = `<div style="text-align:center;padding:40px 20px;color:var(--gray)">
      <div style="font-size:48px;margin-bottom:12px">📦</div>
      <p>No hay pedidos pendientes por recibir</p>
      <p style="font-size:12px;margin-top:8px">Los pedidos aparecerán aquí cuando se ordenen desde "Pedir"</p>
    </div>`;
  }

  if (pending.length > 0) {
    html += `<div style="padding:8px 4px;font-size:14px;font-weight:600;color:var(--dark)">📦 Por Recibir (${pending.length})</div>`;
    pending.forEach(order => {
      const itemsHtml = order.items.map(it => `<div style="padding:1px 0">${it.name} · <strong>${it.qty} ${it.unit}</strong></div>`).join('');
      const ago = timeAgo(order.ordered_at);
      html += `
        <div class="order-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="supplier">${order.supplier}</div>
            <span class="status-badge status-ordered">Ordenado ${ago}</span>
          </div>
          <div class="order-items" style="margin:6px 0;font-size:12px">${itemsHtml}</div>
          <div class="order-actions">
            <button class="btn-receive" onclick="openReceiveModal('${order.id}')">✅ Recibir (15s)</button>
          </div>
        </div>`;
    });
  }

  if (recent.length > 0) {
    html += `<div style="padding:16px 4px 8px;font-size:14px;font-weight:600;color:var(--gray)">✅ Recibidos recientes</div>`;
    recent.forEach(order => {
      const ago = timeAgo(order.received_at);
      html += `
        <div class="order-card" style="opacity:.7">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="supplier">${order.supplier}</div>
            <span class="status-badge status-received">Recibido ${ago}</span>
          </div>
          <div class="order-meta">${order.items.length} productos · Recibió: ${order.receiver||'—'}${order.notes?' · '+order.notes:''}</div>
        </div>`;
    });
  }

  document.getElementById('recibirList').innerHTML = html;
}

function openReceiveModal(orderId) {
  receivingOrderId = orderId;
  const order = orders.find(o => o.id === orderId);
  if (!order) return;

  document.getElementById('receiveModalInfo').innerHTML = `
    <div style="background:#e8eaf6;border-radius:10px;padding:12px;margin-bottom:12px">
      <strong>${order.supplier}</strong>
      <div style="font-size:12px;color:var(--gray);margin-top:4px">${order.items.length} productos · Ordenado ${timeAgo(order.ordered_at)}</div>
    </div>`;

  // Populate receiver input with recent names
  document.getElementById('receiverInput').value = '';
  document.getElementById('recSuggestBox').style.display = 'none';
  // Build recent chips (names used in last 30 days)
  const cutoff = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
  const recentNames = [...new Set(
    orders.filter(o => o.status === 'received' && o.received_at >= cutoff && o.receiver)
          .sort((a,b) => b.received_at.localeCompare(a.received_at))
          .map(o => o.receiver)
  )].slice(0, 8);
  const chipsEl = document.getElementById('recRecentChips');
  chipsEl.innerHTML = recentNames.length
    ? recentNames.map(n => `<button onclick="recPickName('${n.replace(/'/g,"\\'")}')"
        style="padding:4px 10px;border:1px solid var(--gray-border);border-radius:20px;background:white;font-size:12px;cursor:pointer">${n}</button>`).join('')
    : '<span style="font-size:12px;color:var(--gray)">Sin historial reciente</span>';

  document.getElementById('receivePhoto').value = '';
  document.getElementById('receiveNotes').value = '';
  document.getElementById('receiveModal').classList.add('open');
}

function recPickName(name) {
  document.getElementById('receiverInput').value = name;
  document.getElementById('recSuggestBox').style.display = 'none';
}

function recSuggest() {
  const q = (document.getElementById('receiverInput').value || '').toLowerCase().trim();
  const box = document.getElementById('recSuggestBox');
  const cutoff = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
  const recent = [...new Set(
    orders.filter(o => o.status === 'received' && o.received_at >= cutoff && o.receiver)
          .map(o => o.receiver)
  )];
  const allKnown = [...new Set([...recent, ...receivers])];
  const matches = q ? allKnown.filter(n => n.toLowerCase().includes(q)) : allKnown;
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(n =>
    `<div style="padding:8px 12px;font-size:13px;cursor:pointer" onmousedown="recPickName('${n.replace(/'/g,"\\'")}');event.preventDefault()">${n}</div>`
  ).join('');
  box.style.display = 'block';
}
function closeReceiveModal() { document.getElementById('receiveModal').classList.remove('open'); receivingOrderId = null; }

async function confirmReceive() {
  const order = orders.find(o => o.id === receivingOrderId);
  if (!order) return;

  let receiver = (document.getElementById('receiverInput').value || '').trim();
  if (!receiver) { toast('Escribe quién recibe'); return; }
  // Add to known receivers if new
  if (!receivers.includes(receiver)) {
    receivers.push(receiver);
    saveReceivers();
  }

  order.status = 'received';
  order.received_at = new Date().toISOString();
  order.receiver = receiver;
  order.notes = document.getElementById('receiveNotes').value.trim();

  // Optional photo
  const photoInput = document.getElementById('receivePhoto');
  if (photoInput.files[0]) {
    try {
      const img = await loadImage(photoInput.files[0]);
      const canvas = document.createElement('canvas');
      const scale = Math.min(800 / img.naturalWidth, 1);
      canvas.width = Math.round(img.naturalWidth * scale);
      canvas.height = Math.round(img.naturalHeight * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      order.foto = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
    } catch(e) { console.log('Photo error:', e); }
  }

  // Update local inventory counts with received quantities
  let updated = 0;
  (order.items || []).forEach(item => {
    const idx = PRODUCTS.findIndex(p => p.n === item.name);
    if (idx >= 0) {
      const current = counts[idx] !== undefined ? counts[idx] : 0;
      counts[idx] = current + (item.qty || 0);
      updated++;
    }
  });
  if (updated > 0) saveState();

  saveOrders();
  closeReceiveModal();
  renderRecibir();
  toast(`✅ ${order.supplier} recibido por ${receiver}` + (updated ? ` · ${updated} productos actualizados` : ''));
  // Sync receive to Sheet
  pushOrderUpdateToSheet(order.id, receiver, order.received_at, order.notes);
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function markOrderReceiving(supplier) {
  const order = orders.find(o => o.supplier === supplier && o.status === 'ordered');
  if (order) openReceiveModal(order.id);
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `hace ${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `hace ${hrs}h`;
  const days = Math.floor(hrs / 24);
  return `hace ${days}d`;
}

// ============ PRODUCT MANAGEMENT ============
const PRODUCTS_CACHE_KEY = 'nb_inventario_products';
const PRODUCTS_CACHE_TS = 'nb_inventario_products_ts';
let productFilter = 'all';
let productSeasonFilter = '';

function showProducts() {
  showView('viewProducts');
  document.getElementById('headerSub').textContent = 'Gestionar Productos';
  document.getElementById('backBtn').style.display = 'block';
  populateSupplierDropdown();
  renderProductList();
  // Show seed button if products haven't been synced to Sheet yet
  const synced = localStorage.getItem('nb_products_synced');
  document.getElementById('seedBtn').style.display = synced ? 'none' : 'block';
}

function populateSupplierDropdown() {
  const suppliers = [...new Set(PRODUCTS.map(p => p.s).filter(Boolean))].sort();
  const sel = document.getElementById('productSupplierFilter');
  const current = sel.value;
  sel.innerHTML = '<option value="">Todos los proveedores</option>' + suppliers.map(s => `<option value="${s}">${s}</option>`).join('');
  sel.value = current;
}

function setProductSeasonFilter(season, btn) {
  productSeasonFilter = season;
  document.querySelectorAll('#productSeasonFilters .pedir-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderProductList();
}

function setProductFilter(filter, btn) {
  productFilter = filter;
  document.querySelectorAll('#productFilters .pedir-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderProductList();
}

function renderProductList() {
  const search = (document.getElementById('productSearch').value || '').toLowerCase().trim();
  const supplierFilter = (document.getElementById('productSupplierFilter') || {}).value || '';
  const formaFilter = (document.getElementById('productFormaFilter') || {}).value || '';
  let list = PRODUCTS.map((p, i) => ({ ...p, idx: i }));

  if (productFilter === 'active') list = list.filter(p => p.active !== false);
  if (productFilter === 'inactive') list = list.filter(p => p.active === false);
  if (productSeasonFilter) list = list.filter(p => (p.temporada || 'Siempre') === productSeasonFilter);
  if (supplierFilter) list = list.filter(p => p.s === supplierFilter);
  if (formaFilter) list = list.filter(p => (p.f || 'Ir a tienda') === formaFilter);
  if (search) list = list.filter(p => p.n.toLowerCase().includes(search) || (p.s||'').toLowerCase().includes(search) || (p.tags||'').toLowerCase().includes(search));

  // Group by category
  const grouped = {};
  list.forEach(p => {
    if (!grouped[p.c]) grouped[p.c] = [];
    grouped[p.c].push(p);
  });

  let html = `<div style="font-size:12px;color:var(--gray);margin-bottom:8px">${list.length} productos</div>`;

  Object.keys(grouped).sort().forEach(cat => {
    html += `<div style="font-size:13px;font-weight:600;color:var(--green);padding:8px 0 4px;border-bottom:1px solid var(--gray-border)">${cat} (${grouped[cat].length})</div>`;
    grouped[cat].forEach(p => {
      const isActive = p.active !== false;
      const tags = [
        p.temporada && p.temporada !== 'Siempre' ? `<span style="background:#e8f5e9;color:#2e7d32;padding:1px 5px;border-radius:4px;font-size:10px">${p.temporada}</span>` : '',
        p.tags ? p.tags.split(',').map(t => `<span style="background:#e3f2fd;color:#1565c0;padding:1px 5px;border-radius:4px;font-size:10px">${t.trim()}</span>`).join(' ') : '',
        p.variantes ? `<span style="background:#f3e5f5;color:#7b1fa2;padding:1px 5px;border-radius:4px;font-size:10px">📎 ${p.variantes}</span>` : ''
      ].filter(Boolean).join(' ');

      html += `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #f5f5f5;${!isActive?'opacity:.5':''}">
          <button onclick="toggleProductActive(${p.idx})" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0;width:28px">${isActive ? '✅' : '⬜'}</button>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.n}</div>
            <div style="font-size:11px;color:var(--gray)">${p.l} · ${p.s||'—'} ${p.u?'· '+p.u:''}</div>
            ${tags ? `<div style="margin-top:2px;display:flex;gap:3px;flex-wrap:wrap">${tags}</div>` : ''}
          </div>
          <button onclick="editProduct(${p.idx})" style="background:none;border:none;font-size:16px;cursor:pointer;padding:4px">✏️</button>
        </div>`;
    });
  });

  document.getElementById('productListContent').innerHTML = html;
}

function toggleProductActive(idx) {
  PRODUCTS[idx].active = PRODUCTS[idx].active === false ? true : false;
  saveProductsToCache();
  renderProductList();
  // Push to Sheet if connected
  const url = getScriptUrl();
  const p = PRODUCTS[idx];
  if (url && p.id) {
    fetch(url, { method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'toggle_product', id: p.id, active: p.active !== false })
    }).then(r => r.json()).then(d => { if(d.ok) console.log('🔀 Toggle synced:', p.id); })
      .catch(e => console.log('Toggle push error:', e));
  }
  toast(PRODUCTS[idx].active !== false ? '✅ Activado' : '⬜ Desactivado');
}

function openAddProductModal(prefill) {
  document.getElementById('addProductTitle').textContent = prefill ? '✏️ Editar Producto' : '➕ Nuevo Producto';
  document.getElementById('editProductId').value = prefill ? (prefill.idx || '') : '';
  document.getElementById('apName').value = prefill ? prefill.n : '';
  document.getElementById('apCategoria').value = prefill ? prefill.c : 'Insumos / Clubs';
  document.getElementById('apUbicacion').value = prefill ? prefill.l : 'Cocina';
  document.getElementById('apTienda').value = prefill ? (prefill.s||'') : '';
  document.getElementById('apUnidad').value = prefill ? (prefill.u||'') : '';
  document.getElementById('apMin').value = prefill ? (prefill.inv||0) : 0;
  document.getElementById('apMax').value = prefill ? (prefill.max||0) : 0;
  document.getElementById('apForma').value = prefill ? (prefill.f||'Ir a tienda') : 'Ir a tienda';
  document.getElementById('apTemporada').value = prefill ? (prefill.temporada||'Siempre') : 'Siempre';
  document.getElementById('apTags').value = prefill ? (prefill.tags||'') : '';
  document.getElementById('apVariantes').value = prefill ? (prefill.variantes||'') : '';
  document.getElementById('addProductModal').classList.add('open');
}
function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('open'); }

function editProduct(idx) {
  openAddProductModal({ ...PRODUCTS[idx], idx });
}

function saveProduct() {
  const name = document.getElementById('apName').value.trim();
  if (!name) { toast('Nombre requerido'); return; }

  const editIdx = document.getElementById('editProductId').value;
  const productData = {
    n: name,
    c: document.getElementById('apCategoria').value,
    l: document.getElementById('apUbicacion').value,
    s: document.getElementById('apTienda').value.trim(),
    u: document.getElementById('apUnidad').value.trim(),
    inv: parseFloat(document.getElementById('apMin').value) || 0,
    max: parseFloat(document.getElementById('apMax').value) || 0,
    f: document.getElementById('apForma').value,
    temporada: document.getElementById('apTemporada').value,
    tags: document.getElementById('apTags').value.trim(),
    variantes: document.getElementById('apVariantes').value.trim(),
    active: true
  };

  if (editIdx !== '') {
    // Update existing
    const idx = parseInt(editIdx);
    const oldId = PRODUCTS[idx].id;
    Object.assign(PRODUCTS[idx], productData);
    if (oldId) PRODUCTS[idx].id = oldId;
    toast('✏️ ' + name + ' actualizado');
  } else {
    // Add new
    productData.id = 'P' + Date.now();
    PRODUCTS.push(productData);
    toast('✅ ' + name + ' agregado');
  }

  saveProductsToCache();
  closeAddProductModal();
  renderProductList();

  // Push to Sheet
  pushProductToSheet(editIdx !== '' ? PRODUCTS[parseInt(editIdx)] : productData, editIdx !== '');
}

function saveProductsToCache() {
  localStorage.setItem(PRODUCTS_CACHE_KEY, JSON.stringify(PRODUCTS));
  localStorage.setItem(PRODUCTS_CACHE_TS, new Date().toISOString());
}

function getScriptUrl() {
  return localStorage.getItem('nb_script_url') || '';
}

// ── Order sync to Sheet ──
function pushOrderToSheet(order) {
  const url = getScriptUrl();
  if (!url) return;
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'save_order', order: { id: order.id, supplier: order.supplier, items: order.items, mode: order.mode, status: order.status, ordered_at: order.ordered_at } })
  }).then(r => r.json()).then(d => {
    if (d.ok) console.log('📦 Order synced:', order.id);
  }).catch(e => console.log('Order push error:', e));
}

function pushOrderUpdateToSheet(id, receiver, receivedAt, notes) {
  const url = getScriptUrl();
  if (!url) return;
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'update_order', id, status: 'received', received_by: receiver, received_at: receivedAt, notes: notes || '' })
  }).then(r => r.json()).then(d => {
    if (d.ok) console.log('✅ Order receive synced:', id);
  }).catch(e => console.log('Order update error:', e));
}

async function pushProductToSheet(p, isUpdate) {
  const url = getScriptUrl();
  if (!url) return;
  try {
    if (isUpdate && p.id) {
      const resp = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'update_product', id: p.id, fields: {
          Producto: p.n, Categoria: p.c, Ubicacion: p.l, Tienda: p.s, Unidad: p.u,
          Forma_Pedido: p.f, Inventario_Min: p.inv, Inventario_Max: p.max,
          Temporada: p.temporada||'Siempre', Tags: p.tags||'', Variantes: p.variantes||''
        }}) });
      const d = await resp.json(); if(d.ok) console.log('✏️ Product updated:', p.id);
    } else {
      const resp2 = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'add_product', product: {
          ID: p.id, Producto: p.n, Categoria: p.c, Ubicacion: p.l, Tienda: p.s, Unidad: p.u,
          Forma_Pedido: p.f, Inventario_Min: p.inv, Inventario_Max: p.max, Activo: true,
          Temporada: p.temporada||'Siempre', Tags: p.tags||'', Variantes: p.variantes||''
        }}) });
      const d2 = await resp2.json(); if(d2.ok) console.log('➕ Product added:', p.id);
    }
  } catch(e) { console.log('Product push error:', e); }
}

async function seedProductsToSheet() {
  const url = getScriptUrl();
  if (!url) { toast('Configura el Script URL primero'); return; }
  const btn = document.getElementById('seedBtn');
  btn.textContent = '⏳ Subiendo...'; btn.disabled = true;
  let sent = 0;
  for (const p of PRODUCTS) {
    if (!p.id) p.id = 'P' + Date.now() + '_' + sent;
    try {
      await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'add_product', product: {
          ID: p.id, Producto: p.n, Categoria: p.c, Ubicacion: p.l, Tienda: p.s, Unidad: p.u,
          Forma_Pedido: p.f, Inventario_Min: p.inv, Inventario_Max: p.max, Activo: p.active !== false,
          Temporada: p.temporada||'Siempre', Tags: p.tags||'', Variantes: p.variantes||''
        }}) });
      sent++;
    } catch(e) { console.log('Seed error:', e); }
  }
  localStorage.setItem('nb_products_synced', 'true');
  saveProductsToCache();
  btn.textContent = `✅ ${sent} productos subidos`; btn.disabled = false;
  setTimeout(() => { btn.style.display = 'none'; }, 3000);
  toast(`✅ ${sent} productos subidos al Sheet`);
}

async function loadOrdersFromSheet() {
  const url = getScriptUrl();
  if (!url) return false;
  try {
    const resp = await fetch(url + '?action=list_orders');
    const data = await resp.json();
    if (data.orders && data.orders.length > 0) {
      // Map Sheet format to app format (backend already parses Productos_JSON → items)
      orders = data.orders.map(o => ({
        id:          o.ID,
        supplier:    o.Proveedor,
        items:       o.items || [],
        mode:        o.Modo || '',
        status:      o.Status || 'ordered',
        ordered_at:  o.Ordenado_at || '',
        received_at: o.Recibido_at || null,
        receiver:    o.Recibido_por || null,
        notes:       o.Notas || ''
      }));
      saveOrders(); // cache locally so next load is instant
      console.log('📦 Orders refreshed from Sheet:', orders.length);
      return true;
    }
  } catch(e) { console.log('Load orders error:', e); }
  return false;
}

async function loadProductsFromSheet() {
  const url = getScriptUrl();
  if (!url) return false;
  try {
    const resp = await fetch(url + '?action=list_products');
    const data = await resp.json();
    if (data.products && data.products.length > 0) {
      // Map Sheet format to app format
      PRODUCTS.length = 0; // clear
      data.products.forEach(p => {
        PRODUCTS.push({
          id: p.ID,
          n: p.Producto,
          c: p.Categoria,
          l: p.Ubicacion,
          s: p.Tienda,
          u: p.Unidad,
          f: p.Forma_Pedido,
          inv: p.Inventario_Min,
          max: p.Inventario_Max,
          active: p.Activo,
          temporada: p.Temporada || 'Siempre',
          tags: p.Tags || '',
          variantes: p.Variantes || ''
        });
      });
      saveProductsToCache();
      return true;
    }
  } catch(e) { console.log('Load products error:', e); }
  return false;
}

// On app init, try loading from cache first, then fetch from Sheet in background
function loadProductsFromCache() {
  try {
    const cached = localStorage.getItem(PRODUCTS_CACHE_KEY);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (parsed.length > 0) {
        PRODUCTS.length = 0;
        parsed.forEach(p => PRODUCTS.push(p));
        return true;
      }
    }
  } catch(e) {}
  return false;
}

// ============ SEASON FILTERING ============
function getCurrentSeason() {
  const month = new Date().getMonth() + 1;
  if (month >= 3 && month <= 5) return 'Primavera';
  if (month >= 6 && month <= 8) return 'Verano';
  if (month >= 9 && month <= 11) return 'Otoño';
  return 'Invierno';
}

function isProductInSeason(p) {
  if (!p.temporada || p.temporada === 'Siempre') return true;
  return p.temporada === getCurrentSeason();
}

function getActiveProducts() {
  return PRODUCTS.filter(p => p.active !== false && isProductInSeason(p));
}

// ============ NAVIGATION (updated) ============
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  document.getElementById('summaryBar').style.display = (viewId === 'viewSections') ? 'block' : 'none';
}

// ── localStorage Size Management ──
function checkStorageSize() {
  let totalSize = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    totalSize += (k.length + (localStorage.getItem(k) || '').length) * 2;
  }
  const mb = (totalSize / 1024 / 1024).toFixed(2);
  if (totalSize > 4 * 1024 * 1024) {
    console.warn(`⚠️ localStorage at ${mb}MB — nearing limit!`);
    toast(`⚠️ Almacenamiento local al ${mb}MB`);
  } else {
    console.log(`💾 localStorage: ${mb}MB`);
  }
  // Prune old orders (older than 6 months)
  try {
    const orders = JSON.parse(localStorage.getItem('nb_orders') || '[]');
    const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - 6);
    const pruned = orders.filter(o => new Date(o.ordered_at || o.created_at || 0) > cutoff);
    if (pruned.length < orders.length) {
      localStorage.setItem('nb_orders', JSON.stringify(pruned));
      console.log(`🧹 Orders pruned: ${orders.length} → ${pruned.length}`);
    }
  } catch(e) {}
}

// Initialize the app (behind auth gate)
requireNbAuth(function appInit() {
  renderNbUserBadge('nbUserBadge');
  loadOrders();
  loadProductsFromCache(); // Load cached products (overrides hardcoded if available)
  init();
  checkStorageSize();
  // Refresh products + orders from Sheet in background (non-blocking)
  loadProductsFromSheet().then(loaded => {
    if (loaded) { console.log('Products refreshed from Sheet'); renderRoutes(); }
  });
  loadOrdersFromSheet().then(loaded => {
    if (loaded) {
      renderRoutes(); // update pending order count badge
      // If "Recibir" view is currently active, refresh it live
      const recibirView = document.getElementById('viewRecibir');
      if (recibirView && recibirView.classList.contains('active')) renderRecibir();
    }
  });
});

// ═══════════════════════════════════════════════════════════════
// TABLET/PHONE NUMPAD (touch devices only)
// ═══════════════════════════════════════════════════════════════
(function() {
  if (!('ontouchstart' in window)) return;

  let _npTarget = null;
  let _npStr = '';

  const numpad = document.getElementById('nb-numpad');
  const npVal  = document.getElementById('np-value');
  const npLbl  = document.getElementById('np-label');
  const npDot  = document.getElementById('np-dot');

  function getLabel(inp) {
    // stepper label
    const row = inp.closest('.item-row, .count-row, .minmax-field, .form-group');
    return (row?.querySelector('label, .item-name, span')?.textContent || inp.placeholder || '').trim().slice(0, 30);
  }

  function isIntField(inp) {
    const s = parseFloat(inp.step || '1');
    return s === 1 || inp.classList.contains('stepper') || inp.id?.startsWith('cnt-');
  }

  function npShow(inp) {
    _npTarget = inp;
    _npStr = (inp.value && parseFloat(inp.value) !== 0) ? inp.value : '';
    const intOnly = isIntField(inp);
    npDot.disabled = intOnly;
    npLbl.textContent = getLabel(inp) || 'Cantidad';
    npVal.textContent = _npStr || '0';
    numpad.classList.add('np-open');
  }

  function npHide() {
    numpad.classList.remove('np-open');
    if (_npTarget) {
      _npTarget.value = _npStr || '0';
      _npTarget.dispatchEvent(new Event('input', { bubbles: true }));
      _npTarget.dispatchEvent(new Event('change', { bubbles: true }));
      _npTarget = null;
    }
    _npStr = '';
  }

  function npKey(k) {
    if (!_npTarget) return;
    if (k === 'back') {
      _npStr = _npStr.slice(0, -1);
    } else if (k === '.') {
      if (!isIntField(_npTarget) && !_npStr.includes('.')) _npStr += '.';
    } else {
      if (_npStr === '0' && k !== '.') _npStr = k;
      else _npStr += k;
    }
    npVal.textContent = _npStr || '0';
    _npTarget.value = _npStr || '';
    _npTarget.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function attachOne(inp) {
    if (inp.dataset.npAttached) return;
    // Skip stepper inputs that have +/- buttons — they're already touch-friendly
    if (inp.closest('.stepper')) return;
    inp.dataset.npAttached = 'true';
    inp.setAttribute('inputmode', 'none');
    inp.style.caretColor = 'transparent';
    inp.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      npShow(inp);
    }, { passive: false });
    inp.addEventListener('focus', () => {
      if (_npTarget !== inp) npShow(inp);
    });
  }

  window.npAttachAll = function() {
    document.querySelectorAll('input[type="number"]').forEach(attachOne);
  };

  document.addEventListener('DOMContentLoaded', () => {
    // Initial attach (more inputs added dynamically as views render)
    setTimeout(() => window.npAttachAll(), 500);

    // Re-attach when new views render
    const observer = new MutationObserver(() => window.npAttachAll());
    observer.observe(document.body, { childList: true, subtree: true });

    numpad.querySelectorAll('.np-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const k = btn.dataset.key;
        if (k === 'done') npHide();
        else npKey(k);
      });
      btn.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
    });

    document.addEventListener('touchstart', (e) => {
      if (numpad.classList.contains('np-open') && !numpad.contains(e.target)
          && e.target !== _npTarget) {
        npHide();
      }
    }, { passive: true });
  });
})();
