<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NB · Portal de Pagos v3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f1ec; color: #2d2319; min-height: 100vh; }

/* TOPBAR */
.topbar { background: linear-gradient(135deg, #3a7c3a 0%, #2e6b2e 40%, #1a5c2e 100%); color: white; padding: 16px 24px; display: flex; align-items: center; gap: 14px; }
.logo { width: 40px; height: 40px; background: rgba(255,255,255,.95); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #2e6b2e; font-size: 15px; flex-shrink: 0; }
.topbar h1 { font-size: 18px; font-weight: 800; }
.topbar-sub { font-size: 11px; opacity: .7; }
.topbar-right { margin-left: auto; font-size: 12px; opacity: .7; }
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px 100px; }

/* LOADING OVERLAY */
.loading-overlay { position: fixed; inset: 0; background: rgba(245,241,236,.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
.loading-overlay.hidden { display: none; }
.spinner { width: 40px; height: 40px; border: 4px solid #e0d8cf; border-top-color: #2e6b2e; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 12px; font-size: 14px; color: #7a6b5d; font-weight: 600; }

/* SUMMARY */
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: white; border-radius: 14px; padding: 16px 18px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.stat-label { font-size: 11px; color: #999; text-transform: uppercase; font-weight: 700; letter-spacing: .5px; }
.stat-value { font-size: 24px; font-weight: 800; margin-top: 4px; }
.stat.urgent .stat-value { color: #c62828; }
.stat.ok .stat-value { color: #2e7d32; }

/* FILTERS */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.chip { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid #e0d8cf; background: white; color: #7a6b5d; transition: all .15s; }
.chip.active { background: #2e6b2e; color: white; border-color: #2e6b2e; }
.chip:hover:not(.active) { background: #f0ebe4; }
.search-input { flex: 1; min-width: 180px; padding: 8px 14px; border: 2px solid #e0d8cf; border-radius: 10px; font-size: 13px; background: white; }
.search-input:focus { border-color: #2e6b2e; outline: none; }
.btn-add { padding: 8px 16px; border: none; border-radius: 10px; background: #1565C0; color: white; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-add:hover { background: #0d47a1; }

/* INVOICE LIST */
.invoice-list { display: flex; flex-direction: column; gap: 10px; }
.invoice-card { background: white; border-radius: 14px; padding: 16px 18px; box-shadow: 0 2px 8px rgba(0,0,0,.04); border-left: 4px solid #ff9800; cursor: pointer; transition: transform .1s, box-shadow .1s; }
.invoice-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.invoice-card.paid { border-left-color: #43a047; opacity: .7; }
.invoice-card.paid:hover { opacity: 1; }
.ic-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.ic-prov { font-size: 15px; font-weight: 700; }
.ic-folio { font-size: 11px; color: #999; margin-top: 2px; }
.ic-amount { font-size: 18px; font-weight: 800; text-align: right; white-space: nowrap; }
.ic-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.ic-badge { display: inline-flex; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
.badge-pend { background: #fff3e0; color: #e65100; }
.badge-paid { background: #e8f5e9; color: #2e7d32; }
.ic-forma { font-size: 11px; color: #7a6b5d; padding: 3px 8px; background: #f5f0eb; border-radius: 8px; }
.ic-date { font-size: 11px; color: #999; }
.ic-actions { display: flex; gap: 6px; margin-left: auto; }
.btn-pay { padding: 6px 14px; border: none; border-radius: 8px; background: #43a047; color: white; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-pay:hover { background: #2e7d32; }
.btn-edit { padding: 6px 10px; border: 1px solid #e0d8cf; border-radius: 8px; background: white; font-size: 12px; cursor: pointer; color: #7a6b5d; }
.btn-edit:hover { background: #f5f0eb; }
.btn-undo { padding: 6px 10px; border: 1px solid #e0d8cf; border-radius: 8px; background: white; font-size: 12px; cursor: pointer; color: #7a6b5d; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: #bbb; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(3px); z-index: 9000; display: none; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 18px; padding: 28px; width: 92%; max-width: 440px; max-height: 90vh; overflow-y: auto; animation: modalIn .2s ease-out; }
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } }
.modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
.modal label { font-size: 12px; font-weight: 700; color: #7a6b5d; display: block; margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal select { width: 100%; padding: 10px 14px; border: 2px solid #e0d8cf; border-radius: 10px; font-size: 14px; }
.modal input:focus, .modal select:focus { border-color: #2e6b2e; outline: none; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.modal-btn { padding: 10px 22px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
.modal-btn.cancel { background: #f5f0eb; color: #7a6b5d; }
.modal-btn.confirm { background: #43a047; color: white; }
.modal-btn.confirm:disabled { opacity: .5; cursor: not-allowed; }
.modal-btn.danger { background: #e53935; color: white; }

/* EDIT PANEL (inline, replaces card) */
.edit-panel { background: #fffde7; border-radius: 14px; padding: 18px; border-left: 4px solid #ff9800; }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.edit-field label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; display: block; margin-bottom: 3px; }
.edit-field input, .edit-field select { width: 100%; padding: 8px 10px; border: 1.5px solid #e0d8cf; border-radius: 8px; font-size: 13px; }
.edit-field input:focus, .edit-field select:focus { border-color: #2e6b2e; outline: none; }
.edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2d2319; color: white; padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 20000; opacity: 0; transition: all .3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #c62828; }

/* Proveedor autocomplete */
.prov-wrap { position: relative; }
.prov-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid #e0d8cf; border-top: none; border-radius: 0 0 10px 10px; max-height: 160px; overflow-y: auto; z-index: 100; display: none; }
.prov-list.open { display: block; }
.prov-item { padding: 8px 14px; font-size: 13px; cursor: pointer; }
.prov-item:hover { background: #f5f0ea; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .summary { grid-template-columns: 1fr; gap: 8px; }
  .stat { padding: 12px 14px; }
  .stat-value { font-size: 20px; }
  .edit-grid { grid-template-columns: 1fr; }
  .container { padding: 14px 10px 100px; }
}
</style>
</head>

<nav style="display:flex;align-items:center;gap:0;background:#1a3a1a;padding:0 16px;font-size:13px;overflow-x:auto">
  <span style="color:#4caf50;font-weight:800;font-size:14px;padding:10px 16px 10px 0;margin-right:8px;border-right:1px solid rgba(255,255,255,.15)">NB Finance</span>
  <a href="dashboard_nb.html" style="color:rgba(255,255,255,.7);text-decoration:none;padding:10px 16px;font-weight:600">Dashboard</a>

<div class="topbar">
  <div class="logo">NB</div>
  <div>
    <h1>Portal de Pagos</h1>
    <div class="topbar-sub">v3 · Seguimiento de facturas</div>

<script>
// ══════════════════════════════════════════════
// V3 — SERVER-FIRST. No localStorage. No sync queue.
// Every action hits the API. If it fails, we show an error.
// ══════════════════════════════════════════════

let allFacturas = [];
let currentFilter = 'Pendiente';
let editingId = null;
let payingId = null;
let proveedoresList = [];

const SCRIPT_URL_KEY = 'nb_script_url';

function getScriptUrl() { return localStorage.getItem(SCRIPT_URL_KEY) || ''; }

// ── API helpers ──
async function apiGet(action, params = {}) {
  const url = getScriptUrl();
  if (!url) throw new Error('Script URL no configurada');
  const qs = new URLSearchParams({ action, ...params }).toString();
  const resp = await fetch(url + '?' + qs);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function apiPost(body) {
  const url = getScriptUrl();
  if (!url) throw new Error('Script URL no configurada');
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── Load data from server ──
async function loadFacturas() {
  showLoading(true);
  try {
    const data = await apiGet('list_recent', { days: 60 });
    allFacturas = (data.facturas || []).map(normalizeFactura);
    renderSummary();
    renderList();
    showToast('✅ ' + allFacturas.length + ' facturas cargadas');
  } catch (err) {
    // Fallback: try old 'list' action if list_recent not deployed yet
    try {
      const data = await apiGet('list');
      allFacturas = (data.facturas || []).map(normalizeFactura);
      // Client-side 60-day filter as fallback
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 60);
      const cutoffStr = cutoff.toISOString().slice(0, 10);
      allFacturas = allFacturas.filter(f =>
        (f.fecha_compra >= cutoffStr) || (f.fecha_pago >= cutoffStr)
      );
      renderSummary();
      renderList();
      showToast('✅ ' + allFacturas.length + ' facturas (fallback)', 3000);
    } catch (err2) {
      showToast('❌ Error: ' + err2.message, 5000, true);
    }
  }
  showLoading(false);
}

function normalizeFactura(g) {
  const fmtDate = v => {
    if (!v) return '';
    if (v instanceof Date) return v.toISOString().slice(0, 10);
    return String(v).slice(0, 10);
  };
  return {
    id: g.ID || g.id || '',
    folio: String(g.Folio || g.folio || ''),
    tipo_documento: g.Tipo_Documento || g.tipo_documento || '',
    proveedor: g.Proveedor || g.proveedor || '',
    proveedor_raw: g.Proveedor_Raw || g.proveedor_raw || '',
    fecha_compra: fmtDate(g.Fecha_Compra || g.fecha_compra),
    monto_factura: parseFloat(g.Monto_Factura || g.monto_factura || 0),
    ajustes: parseFloat(g.Ajustes || g.ajustes || 0),
    monto_pagar: parseFloat(g.Monto_Pagar || g.monto_pagar || 0),
    forma_pago: g.Forma_Pago || g.forma_pago || '',
    categoria: g.Categoria || g.categoria || '',
    estado: g.Estado || g.estado || 'Pendiente',
    fecha_pago: fmtDate(g.Fecha_Pago || g.fecha_pago),
    comprobante: g.Comprobante || g.comprobante || '',
    created_at: g.Created_At || g.created_at || '',
    foto_url: g.Foto_URL || g.foto_url || ''
  };
}

// ── Filters ──
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function getFiltered() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const today = todayStr();
  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const sevenDaysStr = sevenDaysAgo.toISOString().slice(0, 10);

  return allFacturas.filter(f => {
    // Status filter
    if (currentFilter === 'Pendiente') {
      if (f.estado === 'Pagado') return false;
    } else if (currentFilter === 'Pagado') {
      if (f.estado !== 'Pagado') return false;
    } else if (currentFilter === 'recientes') {
      if ((f.created_at || f.fecha_compra || '') < sevenDaysStr) return false;
    }
    // Search
    if (search) {
      const hay = [f.proveedor, f.folio, f.proveedor_raw, f.categoria].join(' ').toLowerCase();
      if (!hay.includes(search)) {
        // Try numeric match
        const num = parseFloat(search.replace(/[$,]/g, ''));
        if (isNaN(num) || Math.abs((f.monto_pagar || 0) - num) > 1) return false;
      }
    }
    return true;
  });
}

// ── Render ──
function renderSummary() {
  const pend = allFacturas.filter(f => f.estado !== 'Pagado');
  const paid = allFacturas.filter(f => f.estado === 'Pagado');
  const totalPend = pend.reduce((s, f) => s + (f.monto_pagar || 0), 0);
  const totalPaid = paid.reduce((s, f) => s + (f.monto_pagar || 0), 0);

  document.getElementById('summary').innerHTML = `
    <div class="stat ${pend.length > 0 ? 'urgent' : ''}">
      <div class="stat-label">Por pagar</div>
      <div class="stat-value">$${totalPend.toLocaleString('es-MX', { minimumFractionDigits: 0 })}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pendientes</div>
      <div class="stat-value">${pend.length}</div>
    </div>
    <div class="stat ok">
      <div class="stat-label">Pagados (60d)</div>
      <div class="stat-value">$${totalPaid.toLocaleString('es-MX', { minimumFractionDigits: 0 })}</div>
    </div>
  `;
}

function renderList() {
  const list = document.getElementById('invoiceList');
  const filtered = getFiltered();

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No hay facturas ${currentFilter === 'Pendiente' ? 'pendientes' : ''}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(f => {
    if (editingId === f.id) return renderEditPanel(f);
    const isPaid = f.estado === 'Pagado';
    const fpLabel = f.forma_pago || '—';

    return `<div class="invoice-card ${isPaid ? 'paid' : ''}" onclick="cardClick(event, '${f.id}')">
      <div class="ic-row">
        <div>
          <div class="ic-prov">${f.proveedor || f.proveedor_raw || '—'}</div>
          <div class="ic-folio">${f.tipo_documento || ''} ${f.folio ? '#' + f.folio : ''}</div>
        </div>
        <div class="ic-amount">$${(f.monto_pagar || 0).toLocaleString('es-MX', { minimumFractionDigits: 2 })}</div>
      </div>
      <div class="ic-meta">
        <span class="ic-badge ${isPaid ? 'badge-paid' : 'badge-pend'}">${isPaid ? 'PAGADO' : 'PENDIENTE'}</span>
        <span class="ic-forma">${fpLabel}</span>
        <span class="ic-date">${formatDate(f.fecha_compra)}</span>
        ${f.comprobante ? '<span class="ic-date">📎</span>' : ''}
        <div class="ic-actions">
          ${!isPaid
            ? `<button class="btn-pay" onclick="event.stopPropagation();openPayModal('${f.id}')">💰 Pagar</button>
               <button class="btn-edit" onclick="event.stopPropagation();startEdit('${f.id}')">✏️</button>`
            : `<button class="btn-undo" onclick="event.stopPropagation();undoPay('${f.id}')">↩ Deshacer</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderEditPanel(f) {
  return `<div class="edit-panel" id="editPanel">
    <div class="edit-grid">
      <div class="edit-field"><label>Proveedor</label><input id="ed_prov" value="${esc(f.proveedor)}"></div>
      <div class="edit-field"><label>Folio</label><input id="ed_folio" value="${esc(f.folio)}"></div>
      <div class="edit-field"><label>Monto</label><input type="number" id="ed_monto" step="0.01" value="${f.monto_pagar || 0}"></div>
      <div class="edit-field"><label>Fecha compra</label><input type="date" id="ed_fecha" value="${f.fecha_compra}"></div>
      <div class="edit-field">
        <label>Forma de pago</label>
        <select id="ed_forma">
          <option ${f.forma_pago === 'Transferencia' ? 'selected' : ''}>Transferencia</option>
          <option ${f.forma_pago === 'Efectivo' ? 'selected' : ''}>Efectivo</option>
          <option ${f.forma_pago === 'Tarjeta crédito' ? 'selected' : ''}>Tarjeta crédito</option>
          <option ${f.forma_pago === 'Tarjeta débito' ? 'selected' : ''}>Tarjeta débito</option>
          <option ${f.forma_pago === 'Cheque' ? 'selected' : ''}>Cheque</option>
        </select>
      </div>
      <div class="edit-field">
        <label>Categoría</label>
        <select id="ed_cat">
          <option ${f.categoria === 'Adquisición de mercancías' ? 'selected' : ''}>Adquisición de mercancías</option>
          <option ${f.categoria === 'Gastos generales' ? 'selected' : ''}>Gastos generales</option>
        </select>
      </div>
      <div class="edit-field"><label>Fecha pago</label><input type="date" id="ed_fpago" value="${f.fecha_pago}"></div>
    </div>
    <div class="edit-actions">
      <button class="modal-btn cancel" onclick="cancelEdit()">Cancelar</button>
      <button class="modal-btn confirm" onclick="saveEdit('${f.id}')">💾 Guardar</button>
    </div>
  </div>`;
}

function cardClick(event, id) {
  if (event.target.closest('button')) return;
  startEdit(id);
}

// ── Edit ──
function startEdit(id) {
  editingId = editingId === id ? null : id;
  renderList();
}
function cancelEdit() { editingId = null; renderList(); }

async function saveEdit(id) {
  const f = allFacturas.find(x => x.id === id);
  if (!f) return;

  const updates = {
    Proveedor: document.getElementById('ed_prov').value.trim(),
    Folio: document.getElementById('ed_folio').value.trim(),
    Monto_Pagar: parseFloat(document.getElementById('ed_monto').value) || 0,
    Monto_Factura: parseFloat(document.getElementById('ed_monto').value) || 0,
    Fecha_Compra: document.getElementById('ed_fecha').value,
    Forma_Pago: document.getElementById('ed_forma').value,
    Categoria: document.getElementById('ed_cat').value,
    Fecha_Pago: document.getElementById('ed_fpago').value
  };

  // Update local immediately (optimistic)
  Object.assign(f, {
    proveedor: updates.Proveedor,
    folio: updates.Folio,
    monto_pagar: updates.Monto_Pagar,
    monto_factura: updates.Monto_Factura,
    fecha_compra: updates.Fecha_Compra,
    forma_pago: updates.Forma_Pago,
    categoria: updates.Categoria,
    fecha_pago: updates.Fecha_Pago
  });
  editingId = null;
  renderList();
  renderSummary();
  showToast('Guardando…');

  try {
    await apiPost({ action: 'update_factura', id, ...updates });
    showToast('✅ Guardado: ' + updates.Proveedor);
  } catch (err) {
    showToast('❌ Error guardando: ' + err.message, 5000, true);
  }
}

// ── Pay ──
function openPayModal(id) {
  payingId = id;
  const f = allFacturas.find(x => x.id === id);
  if (!f) return;
  document.getElementById('payInfo').innerHTML = `
    <div style="background:#f5f0eb;border-radius:10px;padding:12px 14px;margin-bottom:6px">
      <strong>${f.proveedor}</strong> · $${(f.monto_pagar || 0).toLocaleString('es-MX', { minimumFractionDigits: 2 })}
    </div>`;
  document.getElementById('payDate').value = todayStr();
  document.getElementById('payRef').value = '';
  document.getElementById('payPdf').value = '';
  document.getElementById('payModal').classList.add('open');
}

async function confirmPay() {
  const f = allFacturas.find(x => x.id === payingId);
  if (!f) return;

  const btn = document.getElementById('payConfirmBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Guardando…';

  const payDate = document.getElementById('payDate').value || todayStr();
  const compRef = document.getElementById('payRef').value.trim();

  // Read PDF if attached
  let pdfBase64 = '';
  const pdfFile = document.getElementById('payPdf').files[0];
  if (pdfFile) {
    try {
      pdfBase64 = await fileToBase64(pdfFile);
    } catch (e) { console.log('PDF read error:', e); }
  }

  try {
    // SINGLE atomic API call — no split operations
    const result = await apiPost({
      action: 'pay_factura',
      id: f.id,
      fecha_pago_real: payDate,
      comprobante: compRef,
      pdf_base64: pdfBase64 || undefined,
      proveedor: f.proveedor
    });

    // Update local data
    f.estado = 'Pagado';
    f.fecha_pago = payDate;
    f.comprobante = result.comprobante_url || compRef;

    closeModal('payModal');
    renderList();
    renderSummary();
    showToast('✅ Pagado: ' + f.proveedor);
  } catch (err) {
    // Fallback: try old update_status if pay_factura not deployed
    try {
      await apiPost({ action: 'update_status', id: f.id, estado: 'Pagado', fecha_pago_real: payDate, comprobante: compRef });
      // Also update fecha_pago
      await apiPost({ action: 'update_date', id: f.id, fecha_pago: payDate, estado: 'Pagado' });
      f.estado = 'Pagado';
      f.fecha_pago = payDate;
      f.comprobante = compRef;
      closeModal('payModal');
      renderList();
      renderSummary();
      showToast('✅ Pagado (fallback): ' + f.proveedor);
    } catch (err2) {
      showToast('❌ Error: ' + err2.message, 5000, true);
    }
  }

  btn.disabled = false;
  btn.textContent = 'Confirmar Pago';
}

async function undoPay(id) {
  const f = allFacturas.find(x => x.id === id);
  if (!f) return;
  if (!confirm('¿Revertir a pendiente?')) return;

  try {
    await apiPost({ action: 'update_status', id, estado: 'Pendiente', fecha_pago_real: '' });
    f.estado = 'Pendiente';
    renderList();
    renderSummary();
    showToast('Revertido a pendiente');
  } catch (err) {
    showToast('❌ Error: ' + err.message, 5000, true);
  }
}

// ── Manual Entry ──
async function loadProveedores() {
  try {
    const data = await apiGet('list_proveedores');
    proveedoresList = data.proveedores || [];
  } catch (e) {
    // Build from loaded facturas as fallback
    proveedoresList = [...new Set(allFacturas.map(f => f.proveedor).filter(Boolean))].sort();
  }
}

function provSearch() {
  const q = (document.getElementById('manProv').value || '').toLowerCase().trim();
  const list = document.getElementById('provList');
  const matches = q
    ? proveedoresList.filter(s => s.toLowerCase().includes(q)).slice(0, 10)
    : proveedoresList.slice(0, 10);

  if (!matches.length && !q) { list.classList.remove('open'); return; }

  list.innerHTML = matches.map(s =>
    `<div class="prov-item" onmousedown="selectProv('${esc(s)}')">${s}</div>`
  ).join('');
  list.classList.add('open');
}

function selectProv(name) {
  document.getElementById('manProv').value = name;
  document.getElementById('provList').classList.remove('open');
}

function openManualModal() {
  document.getElementById('manProv').value = '';
  document.getElementById('manDesc').value = '';
  document.getElementById('manMonto').value = '';
  document.getElementById('manFecha').value = todayStr();
  document.getElementById('manFechaPago').value = '';
  document.getElementById('manForma').value = 'Transferencia';
  document.getElementById('manTipo').value = 'Factura';
  document.getElementById('manualModal').classList.add('open');
  loadProveedores();
}

async function confirmManual() {
  const proveedor = document.getElementById('manProv').value.trim();
  const desc = document.getElementById('manDesc').value.trim();
  const monto = parseFloat(document.getElementById('manMonto').value) || 0;
  const fecha = document.getElementById('manFecha').value;
  const fechaPago = document.getElementById('manFechaPago').value;
  const forma = document.getElementById('manForma').value;
  const tipo = document.getElementById('manTipo').value;

  if (!proveedor) { showToast('Proveedor es obligatorio', 3000, true); return; }
  if (!monto || monto <= 0) { showToast('Monto debe ser mayor a 0', 3000, true); return; }
  if (!fecha) { showToast('Fecha es obligatoria', 3000, true); return; }

  const isPaid = !!fechaPago;
  const entry = {
    id: 'MAN-' + Date.now(),
    folio: 'MAN-' + Date.now(),
    tipo_documento: tipo,
    proveedor: proveedor,
    proveedor_raw: proveedor,
    fecha_compra: fecha,
    monto_factura: monto,
    monto_pagar: monto,
    forma_pago: forma,
    estado: isPaid ? 'Pagado' : 'Pendiente',
    fecha_pago: fechaPago || '',
    fecha_pago_real: isPaid ? fechaPago : '',
    credit_days: 0,
    comprobante: '',
    created_at: new Date().toISOString(),
    categoria: tipo === 'Gasto' ? 'Gastos generales' : 'Adquisición de mercancías'
  };
  if (desc) entry.descripcion = desc;

  // Add locally immediately
  allFacturas.unshift(normalizeFactura(entry));
  closeModal('manualModal');
  renderList();
  renderSummary();
  showToast('Guardando…');

  try {
    await apiPost({ action: 'create', gasto: entry });
    showToast('✅ Registrado: ' + proveedor);
  } catch (err) {
    showToast('❌ Error: ' + err.message, 5000, true);
  }
}

// ── Helpers ──
function todayStr() { return new Date().toISOString().slice(0, 10); }
function formatDate(d) {
  if (!d) return '—';
  const [y, m, dd] = d.split('-');
  const months = ['', 'Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
  return `${parseInt(dd)} ${months[parseInt(m)]} ${y}`;
}
function esc(s) { return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
}

let toastTimer;
function showToast(msg, ms = 3000, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', ms);
}

// Close modals on backdrop click
document.addEventListener('click', e => {
  if (e.target.id === 'payModal') closeModal('payModal');
  if (e.target.id === 'manualModal') closeModal('manualModal');
});
// Close proveedor list on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.prov-wrap')) {
    document.getElementById('provList').classList.remove('open');
  }
});

// ── Init ──
window.addEventListener('load', () => requireNbAuth(function appInit() {
  const url = getScriptUrl();
  if (!url) {
    // Show config prompt
    const u = prompt('Pega la Script URL de Google Apps Script:');
    if (u && u.startsWith('https://script.google.com')) {
      localStorage.setItem(SCRIPT_URL_KEY, u);
    } else {
      showToast('❌ Necesitas la Script URL para continuar', 5000, true);
      showLoading(false);
      return;
    }
  }
  document.getElementById('topbarInfo').textContent = new Date().toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  loadFacturas();
}));
</script>
